// ============================================================================
// add Comfort module to stock parts
// ============================================================================


@PART[cupola]:NEEDS[FeatureComfort]:FOR[KerbalismDefault]
{
  MODULE
  {
    name = Comfort
    bonus = panorama
    desc = #KERBALISM_Comfort_panorama_desc
  }

  @tags ^= :$: comfort:
}


@PART[kerbalism-greenhouse]:NEEDS[FeatureComfort]:FOR[KerbalismDefault]
{
  MODULE
  {
    name = Comfort
    bonus = plants
    desc = #KERBALISM_Comfort_plants_desc
  }

  @tags ^= :$: comfort:
}


@PART[crewCabin]:NEEDS[FeatureComfort]:FOR[KerbalismDefault]
{
  MODULE
  {
    name = Comfort
    bonus = exercise
    desc = #KERBALISM_Comfort_exercise_desc
  }

  @tags ^= :$: comfort:
}

// Crewed experiments
@PART[*]:HAS[#CrewCapacity[>3],!MODULE[ModuleCommand],!MODULE[Laboratory],!MODULE[StationScienceModule],!MODULE[LaunchClamp]]:NEEDS[FeatureScience]:FIRST
{	
	MODULE
	{
		name = Configure
		configureId = CrewExperiments
		title = #KERBALISM_Configure_CrewExperiments_title
	}
}

// Probes
@PART[*]:HAS[@MODULE[ModuleCommand]:HAS[#minimumCrew[0]]]:FIRST
{
	MODULE
	{
		name = Configure
		configureId = UnmannedExperiments
		title = #KERBALISM_Configure_UnmannedExperiments_title
	}
}

// SpectroVariometer
@PART[sensorAtmosphere]:NEEDS[FeatureScience]:FIRST
{	
	MODULE
	{
		name = Configure
		configureId = AtmosphericScience
		title = #KERBALISM_Configure_AtmosphericScience_title
	}
	MODULE
	{
		name = Configure
		configureId = UnderwaterScience
		title = #KERBALISM_Configure_UnderwaterScience_title
	}
	MODULE
	{
		name = Configure
		configureId = AtmosphericHarvester
		title = #KERBALISM_Configure_AtmosphericHarvester_title
	}
	MODULE
	{
		name = Configure
		configureId = SpectroVariometerSetup
		title = #KERBALISM_Configure_SpectroVariometerSetup_title
		slots = 1
		
		SETUP
			{
				name = None
				title = #KERBALISM_None_title
				desc = #KERBALISM_None_instruments_desc//Empty slot for mass and cost savings, should you not require any instruments installed.
			}
		SETUP
			{
				name = Atmospheric Science
				title = #KERBALISM_Configure_AtmosphericScience_title
				desc = #KERBALISM_SETUP_AtmosphericScience_desc//Configures the part as a science instrument, allowing for a selection of atmospheric instruments.
				MODULE
				{
					type = Configure
					id_field = configureId
					id_value = AtmosphericScience
				}
			}
		SETUP
			{
				name = Underwater Science
				title = #KERBALISM_Configure_UnderwaterScience_title
				desc = #KERBALISM_SETUP_UnderwaterScience_desc//Configures the part as a science instrument, allowing for a selection of underwater experiments.
				MODULE
				{
					type = Configure
					id_field = configureId
					id_value = UnderwaterScience
				}
			}
		SETUP
			{
				name = Atmospheric Harvester
				title = #KERBALISM_Configure_AtmosphericHarvester_title
				desc = #KERBALISM_SETUP_AtmosphericHarvester_desc//Configures the part as an atmospheric harvester, allowing for extraction of resources from the atmosphere.
				MODULE
				{
					type = Configure
					id_field = configureId
					id_value = AtmosphericHarvester
				}
			}
	}
}

// ============================================================================
// Specific patches for the stock M700 scanner
// ============================================================================
@PART[SurveyScanner]:NEEDS[FeatureScience]:FIRST
{
	MODULE
	{
		name = Configure
		configureId = OrbitalScanner
		title = #KERBALISM_Configure_OrbitalScanner_title
	}
}

// link the stock animation module to our experiment modules
@PART[SurveyScanner]:NEEDS[FeatureScience]:AFTER[zzzKerbalismDefault]
{
  @MODULE[Experiment],*
  {
    %use_animation_group = true
  }
}

// ============================================================================
// Patch for the SENTINEL module, to add EC/comms usage through Kerbalism
// ============================================================================

@PART[*]:HAS[@MODULE[SentinelModule]]:NEEDS[FeatureScience]:AFTER[zzzKerbalismDefault]
{
	@MODULE[SentinelModule]
	{
		@name = KerbalismSentinel
		ec_rate = 2.0 // EC/s
		comms_rate = 0.005 // Mb/s
	}
}
		//Radiation Scan
		#KERBALISM_EXPERIMENT_Radiation_title = Scansione radiazioni
		//Experiment results
		#KERBALISM_EXPERIMENT_Radiation_default = Santo cielo, questi risultati sono incredibili!
		#KERBALISM_EXPERIMENT_Radiation_MohoSrfLanded = Il contatore Geiger concorda che Moho sarebbe più bello con la lava. Il KSC vi ha informato che parlare con il contatore Geiger è severamente vietato.
		#KERBALISM_EXPERIMENT_Radiation_EveSrfLanded = Sembra che i livelli elevati di radiazione siano l'unica cosa di cui non dovete preoccuparvi sulla superficie di Eve.
		#KERBALISM_EXPERIMENT_Radiation_GillySrfLanded = Vi state divertendo troppo a rimbalzare per controllare i livelli di radiazione.
		#KERBALISM_EXPERIMENT_Radiation_KerbinSrfLanded = I livelli di radiazione qui su Kerbin sono letteralmente nominali. Qualcosa deve bloccare la radiazione.
		#KERBALISM_EXPERIMENT_Radiation_MunSrfLanded = La radiazione sulla superficie della Mun è piuttosto elevata; qualsiasi futura abitazione richiederà più schermatura.
		#KERBALISM_EXPERIMENT_Radiation_MinmusSrfLanded = Guardando i livelli di radiazione, vi pentite di aver assaggiato la superficie di Minmus.
		#KERBALISM_EXPERIMENT_Radiation_DunaSrfLanded = Questi risultati sono cruciali per lo sviluppo di una colonia su Duna. Peccato se succedesse qualcosa...
		#KERBALISM_EXPERIMENT_Radiation_IkeSrfLanded = La superficie contiene una traccia di composti radioattivi; R&D ritiene che siano elementi creati dalle interazioni tra vento solare e atmosfera di Duna.
		#KERBALISM_EXPERIMENT_Radiation_DresSrfLanded = Incrociando questi risultati con campioni superficiali, Dres sembra costituito in gran parte da metalli pesanti e radioattivi
		#KERBALISM_EXPERIMENT_Radiation_LaytheSrfLanded = L'atmosfera e il nucleo attivo di Laythe proteggono la sua superficie dall'intensa fascia di radiazioni di Jool, ma la radiazione di fondo è significativamente più alta di quella di Kerbin
		#KERBALISM_EXPERIMENT_Radiation_VallSrfLanded = Vall è abbastanza fortunata da non trovarsi nella fascia di radiazioni di Jool, ma la radiazione sulla superficie è comunque significativa.
		#KERBALISM_EXPERIMENT_Radiation_TyloSrfLanded = La magnetosfera funzionante di Tylo è sufficiente a schermare il pianeta dalla maggior parte delle radiazioni di Jool, ma la mancanza di atmosfera significa che una quantità significativa di radiazione raggiunge comunque la superficie
		#KERBALISM_EXPERIMENT_Radiation_BopSrfLanded = Il KSC vi mette in guardia dal cercare di individuare l'intensa fonte di radiazione che hanno avvistato dall'orbita.
		#KERBALISM_EXPERIMENT_Radiation_PolSrfLanded = Sembra che Pol contenga una grande quantità di isotopi radioattivi di idrogeno ed elio, depositati da Jool nel corso di migliaia di anni.
		#KERBALISM_EXPERIMENT_Radiation_EelooSrfLanded = Così lontano da Kerbol, una quantità molto maggiore di radiazione interstellare raggiunge la superficie. Sarebbe un ottimo posto per studi futuri

		#KERBALISM_EXPERIMENT_Radiation_EveFlyingLow = La fitta atmosfera e la grande magnetosfera di Eve impediscono a qualsiasi radiazione di raggiungere questa altitudine.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingLow = Le vibrazioni del razzo rendono illeggibili le lancette, quindi decidete di inventarvi i risultati.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingLow = L'atmosfera sembra bloccare più radiazione del previsto. Buone notizie per le future missioni su Duna.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingLow = Andate a controllare il contatore Geiger, ma si rifiuta di mostrare una lettura finché non lo portate fuori dall'atmosfera.
		#KERBALISM_EXPERIMENT_Radiation_LaytheFlyingLow = Gli oceani sottostanti emettono una quantità inaspettata di radiazione.
		#KERBALISM_EXPERIMENT_Radiation_EveFlyingHigh = Siete troppo occupati a cercare di non bruciare nell'atmosfera per guardare il contatore Geiger.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingHigh = L'atmosfera assorbe la maggior parte della radiazione, anche lassù.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingHigh = L'atmosfera qui emette grandi quantità di particelle ionizzate.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingHigh = Il KSC ha assicurato che il vostro terzo occhio è perfettamente normale.
		#KERBALISM_EXPERIMENT_Radiation_LaytheFlyingHigh = La radiazione di Jool produce sottoprodotti interessanti quando bombarda l'atmosfera di Laythe
		#KERBALISM_EXPERIMENT_Radiation_SunInSpaceLow = È oltre 9000!!
		#KERBALISM_EXPERIMENT_Radiation_MohoInSpaceLow = R&D vi informa che questi risultati hanno contribuito a una scoperta scientifica. Siete troppo occupati ad abbracciare il condizionatore per interessarvene.
		#KERBALISM_EXPERIMENT_Radiation_EveInSpaceLow = L'atmosfera di Eve emette strani ioni che falsano le vostre letture.
		#KERBALISM_EXPERIMENT_Radiation_GillyInSpaceLow = I livelli di radiazione qui fluttuano a causa dell'orbita eccentrica di Gilly e della magnetosfera di Eve.
		#KERBALISM_EXPERIMENT_Radiation_KerbinInSpaceLow = L'ambiente radiativo lassù è più complesso di quanto pensassimo. Questo darà a R&D qualcosa di nuovo da studiare.
		#KERBALISM_EXPERIMENT_Radiation_MunInSpaceLow = Notate un impulso costante di radiazione mentre passate sul lato oscuro della Mun. Probabilmente non è niente.
		#KERBALISM_EXPERIMENT_Radiation_MinmusInSpaceLow = I risultati indicano che Minmus contiene grandi quantità di composti radioattivi mescolati nella crosta ghiacciata.
		#KERBALISM_EXPERIMENT_Radiation_DunaInSpaceLow = Il sole sta erodendo la fragile atmosfera di Duna, che emette un flusso di particelle ionizzate.
		#KERBALISM_EXPERIMENT_Radiation_IkeInSpaceLow = L'orbita ravvicinata e la rotazione sincrona di Ike significano che quando siete sul lato rivolto verso Duna i livelli di radiazione calano enormemente.
		#KERBALISM_EXPERIMENT_Radiation_DresInSpaceLow = Il contatore Geiger ha rilevato grandi quantità di radiazione provenienti da Dres.
		#KERBALISM_EXPERIMENT_Radiation_JoolInSpaceLow = Il KSC ha consigliato che non vi sarà permesso di tornare per paura che contaminiate il resto del kerbalkind
		#KERBALISM_EXPERIMENT_Radiation_LaytheInSpaceLow = Mentre guardate il bellissimo oceano sottostante, dimenticate che state lentamente morendo di avvelenamento da radiazioni.
		#KERBALISM_EXPERIMENT_Radiation_VallInSpaceLow = Incredibilmente, i livelli di radiazione sono a un livello ragionevole.
		#KERBALISM_EXPERIMENT_Radiation_TyloInSpaceLow = La sottile magnetosfera di Tylo agisce come un generatore, amplificando il già intenso campo di radiazioni di Jool.
		#KERBALISM_EXPERIMENT_Radiation_BopInSpaceLow = Bop ha una quantità anormalmente elevata di radiazione che sembra puntata a 68 gradi nord, 114 gradi est. Strano
		#KERBALISM_EXPERIMENT_Radiation_PolInSpaceLow = Lo spazio intorno a Pol è pieno di ioni radioattivi abbastanza sfortunati da essere catturati dalla magnetosfera di Jool.
		#KERBALISM_EXPERIMENT_Radiation_EelooInSpaceLow = R&D è desideroso di studiare quali effetti la grande quantità di radiazione interstellare ha avuto sulla superficie di Eeloo.
		#KERBALISM_EXPERIMENT_Radiation_SunInSpaceHigh = Il KSC vi informa che *forse* hanno dimenticato di aggiungere la schermatura.
		#KERBALISM_EXPERIMENT_Radiation_MohoInSpaceHigh = La radiazione del sole è aumentata drasticamente nel corso del vostro viaggio.
		#KERBALISM_EXPERIMENT_Radiation_EveInSpaceHigh = Non vedete l'ora di attraversare la fascia di radiazioni di Eve.
		#KERBALISM_EXPERIMENT_Radiation_GillyInSpaceHigh = Vi rifiutate di controllare i livelli di radiazione finché il KSC non smette di fare battute sulle patate.
		#KERBALISM_EXPERIMENT_Radiation_KerbinInSpaceHigh = Questo posto è pericoloso.
		#KERBALISM_EXPERIMENT_Radiation_MunInSpaceHigh = Avete attraversato la fascia di radiazioni di Kerbin e non siete morti. Temete che questo genererà un mucchio di folli teorie del complotto.
		#KERBALISM_EXPERIMENT_Radiation_MinmusInSpaceHigh = Rilevate una quantità anomala di radiazione, ma non riuscite a capirne l'origine.
		#KERBALISM_EXPERIMENT_Radiation_DunaInSpaceHigh = Duna non sembra avere una magnetosfera, quindi la radiazione cosmica sarà un problema per le future missioni su Duna.
		#KERBALISM_EXPERIMENT_Radiation_IkeInSpaceHigh = Inaspettatamente, Ike sembra essere abbastanza magnetico da interferire con gli ioni strappati all'atmosfera di Duna.
		#KERBALISM_EXPERIMENT_Radiation_DresInSpaceHigh = Nell'asteroide, nessuno può sentirti fare facepalm quando ti rendi conto di aver dimenticato il contatore Geiger.
		#KERBALISM_EXPERIMENT_Radiation_JoolInSpaceHigh = La radiazione emessa da Jool è una quantità sbalorditiva, e iniziate a desiderare di essere nella missione di esplorazione di Duna.
		#KERBALISM_EXPERIMENT_Radiation_LaytheInSpaceHigh = Laythe, incredibilmente, oppone una grande resistenza all'assalto della fascia di radiazioni di Jool. Buona fortuna Laythe. Buona fortuna.
		#KERBALISM_EXPERIMENT_Radiation_VallInSpaceHigh = Anche se Vall non si trova nella fascia principale di radiazioni, è comunque duramente colpita dalle radiazioni di Jool.
		#KERBALISM_EXPERIMENT_Radiation_TyloInSpaceHigh = La radiazione di Jool forma un'intensa fascia intorno a Tylo, ma per fortuna non sembra che molta raggiunga la superficie. Ma «molta» è un termine relativo.
		#KERBALISM_EXPERIMENT_Radiation_BopInSpaceHigh = Bop sembra essere una fonte di radiazione intensa, ma nel campo di radiazioni di Jool non appare significativa.
		#KERBALISM_EXPERIMENT_Radiation_PolInSpaceHigh = Pol è abbastanza lontana da Jool da ricevere isotopi ionizzati provenienti dalla magnetosfera di Jool e dal gas interplanetario.
		#KERBALISM_EXPERIMENT_Radiation_EelooInSpaceHigh = Con l'influenza di Kerbol che si indebolisce, la radiazione interstellare diventa molto più pronunciata. I segreti della galassia si aprono davanti a voi.

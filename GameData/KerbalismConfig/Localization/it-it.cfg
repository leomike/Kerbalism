		#kerbalism-container-inline-250_Part_description = Dopo gli eccessi stravaganti della precedente generazione di contenitori di rifornimenti per lo spazio, il dipartimento fiscale non era molto felice di finanziare lo sviluppo di uno ancora più grande. Quando uno degli impiegati si lamentò della logica di «mettere uomini nello spazio per il gusto di farlo», il JPL passò alla modalità guerra e ricattò tutti i burocrati coinvolti fino alla sottomissione. E il progetto fu approvato con solerzia.

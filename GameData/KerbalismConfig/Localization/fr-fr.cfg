		// ********** Part: kerbalism-activeshield
		#kerbalism-activeshield_Part_description = Génère un champ magnétique autour du vaisseau, réduisant les radiations incidentes. L'effet n'est significatif qu'en relation avec les niveaux de radiation rencontrés en vol interplanétaire, et ne fera presque rien à l'intérieur des ceintures de particules surchargées ou lors des tempêtes solaires.
		#kerbalism-activeshield_Part_manufacturer = TripleZeta Workshops
		#kerbalism-activeshield_Part_title = Bouclier actif

		// ********** Part: kerbalism-antenna
		#kerbalism-antenna_Part_description = Conçue il y a longtemps par un jeune et inspiré Wernher von Kerman, avant que son attention ne se tourne vers le développement d'armes de destruction massive.
		#kerbalism-antenna_Part_manufacturer = Ionic Symphonic Protonic Electronics
		#kerbalism-antenna_Part_title = Communotron 8

		// ********** Part: kerbalism-chemicalplant
		#kerbalism-chemicalplant_Part_description = Une usine chimique polyvalente qui peut tenir dans la petite baie de service. Toute ressemblance avec le Convert-O-Tron est purement fortuite.
		#kerbalism-chemicalplant_Part_manufacturer = Rookies Inc.
		#kerbalism-chemicalplant_Part_title = Usine chimique

		// ********** Part: kerbalism-container-inline-0625
		#kerbalism-container-inline-0625_Part_description = Une alternative valable à mourir de faim.
		#kerbalism-container-inline-0625_Part_manufacturer = Nazari Storage Services
		#kerbalism-container-inline-0625_Part_title = Conteneur de provisions, 0,625 m

		// ********** Part: kerbalism-container-inline-125
		#kerbalism-container-inline-125_Part_description = Un des gars du JPL a eu une idée simple et brillante : des conteneurs plus grands pour stocker plus de provisions. Après quelques milliers d'hommes-mois et 300 M de financement, le prototype était prêt pour les tests préliminaires.
		#kerbalism-container-inline-125_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-125_Part_title = Conteneur de provisions, 1,25 m

		// ********** Part: kerbalism-container-inline-250
		#kerbalism-container-inline-250_Part_description = Après les excès extravagants de la génération précédente de conteneurs de provisions spatiales, le service des finances n'était pas très enthousiaste à l'idée de financer un modèle encore plus grand. Quand un des commis s'est plaint de la logique derrière « mettre des hommes dans l'espace pour le plaisir », le JPL est passé en mode guerre et a fait chanter tous les bureaucrates impliqués jusqu'à leur soumission. Et le projet fut approuvé dans la foulée.
		#kerbalism-container-inline-250_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-250_Part_title = Conteneur de provisions, 2,5 m

		// ********** Part: kerbalism-container-inline-375
		#kerbalism-container-inline-375_Part_description = Il était clair dès le départ que 3,75 m était la taille idéale pour les missions dans l'espace lointain, mais le coût de conception était prohibitif. La solution inattendue est venue le jour où les gars de l'atelier ont tenté d'assembler un grand conteneur de provisions en utilisant de mauvais plans.
		#kerbalism-container-inline-375_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-375_Part_title = Conteneur de provisions, 3,75 m


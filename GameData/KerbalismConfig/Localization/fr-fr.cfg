		//Radiation Scan
		#KERBALISM_EXPERIMENT_Radiation_title = Scan de radiation
		//Experiment results
		#KERBALISM_EXPERIMENT_Radiation_default = Par les cornes de vache, ces résultats sont incroyables !
		#KERBALISM_EXPERIMENT_Radiation_MohoSrfLanded = Le compteur Geiger confirme que Moho serait plus cool avec de la lave. Le KSC vous informe que parler au compteur Geiger est strictement interdit.
		#KERBALISM_EXPERIMENT_Radiation_EveSrfLanded = Il semble que les niveaux élevés de radiation soient la seule chose dont vous n'ayez pas à vous soucier à la surface d'Eve.
		#KERBALISM_EXPERIMENT_Radiation_GillySrfLanded = Vous vous amusez trop à rebondir pour vérifier les niveaux de radiation.
		#KERBALISM_EXPERIMENT_Radiation_KerbinSrfLanded = Les niveaux de radiation sont littéralement nominaux ici sur Kerbin. Quelque chose doit bloquer la radiation.
		#KERBALISM_EXPERIMENT_Radiation_MunSrfLanded = La radiation à la surface de la Mun est assez élevée ; toute future habitation nécessiterait plus de blindage.
		#KERBALISM_EXPERIMENT_Radiation_MinmusSrfLanded = En regardant les niveaux de radiation, vous regrettez d'avoir goûté la surface de Minmus.
		#KERBALISM_EXPERIMENT_Radiation_DunaSrfLanded = Ces résultats sont cruciaux pour le développement d'une colonie sur Duna. Dommage que quelque chose leur arrive...
		#KERBALISM_EXPERIMENT_Radiation_IkeSrfLanded = La surface contient une trace de composés radioactifs ; la R&D pense qu'il s'agit d'éléments créés par les interactions entre le vent solaire et l'atmosphère de Duna.
		#KERBALISM_EXPERIMENT_Radiation_DresSrfLanded = En recoupant ces résultats avec des échantillons de surface, Dres semble composée en grande partie de métaux lourds et radioactifs
		#KERBALISM_EXPERIMENT_Radiation_LaytheSrfLanded = L'atmosphère et le noyau actif de Laythe protègent sa surface de l'intense ceinture de radiation de Jool, mais la radiation de fond est nettement plus élevée que sur Kerbin
		#KERBALISM_EXPERIMENT_Radiation_VallSrfLanded = Vall a la chance de ne pas être située dans la ceinture de radiation de Jool, mais la radiation à la surface reste significative.
		#KERBALISM_EXPERIMENT_Radiation_TyloSrfLanded = La magnétosphère fonctionnelle de Tylo suffit à protéger la planète de la plupart des radiations de Jool, mais l'absence d'atmosphère signifie qu'une quantité significative de radiation atteint encore la surface
		#KERBALISM_EXPERIMENT_Radiation_BopSrfLanded = Le KSC met en garde contre toute tentative de localiser la source intense de radiation repérée depuis l'orbite.
		#KERBALISM_EXPERIMENT_Radiation_PolSrfLanded = Il semble que Pol contienne une grande quantité d'isotopes radioactifs d'hydrogène et d'hélium, déposés par Jool sur des milliers d'années.
		#KERBALISM_EXPERIMENT_Radiation_EelooSrfLanded = Si loin de Kerbol, beaucoup plus de radiation interstellaire atteint la surface. Ce serait un endroit idéal pour de futures études

		#KERBALISM_EXPERIMENT_Radiation_EveFlyingLow = L'épaisse atmosphère et la grande magnétosphère d'Eve empêchent toute radiation d'atteindre cette altitude.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingLow = Les vibrations de votre fusée rendent les cadrans illisibles, alors vous décidez d'inventer les résultats.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingLow = L'atmosphère semble bloquer plus de radiation que prévu initialement. C'est bon signe pour les futures missions sur Duna.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingLow = Vous allez vérifier le compteur Geiger, mais il refuse d'afficher une lecture tant que vous ne l'avez pas sorti de l'atmosphère.
		#KERBALISM_EXPERIMENT_Radiation_LaytheFlyingLow = Les océans en dessous émettent une quantité inattendue de radiation.
		#KERBALISM_EXPERIMENT_Radiation_EveFlyingHigh = Vous êtes trop occupé à essayer de ne pas brûler dans l'atmosphère pour regarder le compteur Geiger.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingHigh = L'atmosphère absorbe la plupart de la radiation, même là-haut.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingHigh = L'atmosphère ici émet de grandes quantités de particules ionisées.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingHigh = Le KSC a assuré que votre troisième œil est tout à fait normal.
		#KERBALISM_EXPERIMENT_Radiation_LaytheFlyingHigh = La radiation de Jool produit des sous-produits intéressants lorsqu'elle bombarde l'atmosphère de Laythe
		#KERBALISM_EXPERIMENT_Radiation_SunInSpaceLow = C'est plus de 9000 !!
		#KERBALISM_EXPERIMENT_Radiation_MohoInSpaceLow = La R&D vous informe que ces résultats ont contribué à une percée scientifique. Vous êtes trop occupé à serrer le climatiseur pour vous en soucier.
		#KERBALISM_EXPERIMENT_Radiation_EveInSpaceLow = L'atmosphère d'Eve émet d'étranges ions qui faussent vos mesures.
		#KERBALISM_EXPERIMENT_Radiation_GillyInSpaceLow = Les niveaux de radiation fluctuent ici à cause de l'orbite excentrique de Gilly et de la magnétosphère d'Eve.
		#KERBALISM_EXPERIMENT_Radiation_KerbinInSpaceLow = L'environnement radiologique là-haut est plus complexe que nous le pensions. Cela devrait donner à la R&D de nouvelles pistes d'étude.
		#KERBALISM_EXPERIMENT_Radiation_MunInSpaceLow = Vous remarquez une pulsation régulière de radiation en passant au-dessus de la face sombre de la Mun. Ce n'est probablement rien.
		#KERBALISM_EXPERIMENT_Radiation_MinmusInSpaceLow = Les résultats indiquent que Minmus contient de grandes quantités de composés radioactifs mélangés dans sa croûte glacée.
		#KERBALISM_EXPERIMENT_Radiation_DunaInSpaceLow = Le soleil arrache la fragile atmosphère de Duna, car Duna émet un flux de particules ionisées.
		#KERBALISM_EXPERIMENT_Radiation_IkeInSpaceLow = L'orbite proche et la rotation synchrone d'Ike signifient que lorsque vous êtes au-dessus du côté d'Ike face à Duna, les niveaux de radiation chutent considérablement.
		#KERBALISM_EXPERIMENT_Radiation_DresInSpaceLow = Le compteur Geiger a détecté de grandes quantités de radiation provenant de Dres.
		#KERBALISM_EXPERIMENT_Radiation_JoolInSpaceLow = Le KSC a conseillé que vous ne seriez pas autorisé à revenir de peur que vous ne contaminiez le reste de l'humanité kerbal
		#KERBALISM_EXPERIMENT_Radiation_LaytheInSpaceLow = Alors que vous regardez le magnifique océan en dessous, vous oubliez que vous mourez lentement d'une intoxication aux radiations.
		#KERBALISM_EXPERIMENT_Radiation_VallInSpaceLow = Étonnamment, les niveaux de radiation sont à un niveau raisonnable.
		#KERBALISM_EXPERIMENT_Radiation_TyloInSpaceLow = La subtile magnétosphère de Tylo agit comme un générateur, amplifiant le champ de radiation déjà intense de Jool.
		#KERBALISM_EXPERIMENT_Radiation_BopInSpaceLow = Bop présente une quantité anormalement élevée de radiation qui semble localisée à 68 degrés nord, 114 degrés est. Étrange
		#KERBALISM_EXPERIMENT_Radiation_PolInSpaceLow = L'espace autour de Pol est rempli d'ions radioactifs assez malchanceux pour être capturés par la magnétosphère de Jool.
		#KERBALISM_EXPERIMENT_Radiation_EelooInSpaceLow = La R&D est impatiente d'étudier quels effets la grande quantité de radiation interstellaire a eu sur la surface d'Eeloo.
		#KERBALISM_EXPERIMENT_Radiation_SunInSpaceHigh = Le KSC vous informe qu'ils ont *peut-être* oublié d'ajouter le blindage.
		#KERBALISM_EXPERIMENT_Radiation_MohoInSpaceHigh = La radiation du soleil a considérablement augmenté au cours de votre voyage.
		#KERBALISM_EXPERIMENT_Radiation_EveInSpaceHigh = Vous n'avez guère envie de traverser la ceinture de radiation d'Eve.
		#KERBALISM_EXPERIMENT_Radiation_GillyInSpaceHigh = Vous refusez de vérifier les niveaux de radiation tant que le KSC ne cesse pas de faire des blagues sur les pommes de terre.
		#KERBALISM_EXPERIMENT_Radiation_KerbinInSpaceHigh = Cet endroit est dangereux.
		#KERBALISM_EXPERIMENT_Radiation_MunInSpaceHigh = Vous avez traversé la ceinture de radiation de Kerbin sans mourir. Vous craignez que cela ne fasse naître toutes sortes de théories du complot.
		#KERBALISM_EXPERIMENT_Radiation_MinmusInSpaceHigh = Vous détectez une quantité anormale de radiation, mais n'arrivez pas à en déterminer l'origine.
		#KERBALISM_EXPERIMENT_Radiation_DunaInSpaceHigh = Duna ne semble pas avoir de magnétosphère, donc la radiation cosmique sera un problème pour les futures missions sur Duna.
		#KERBALISM_EXPERIMENT_Radiation_IkeInSpaceHigh = De façon inattendue, Ike semble assez magnétique pour perturber les ions arrachés à l'atmosphère de Duna.
		#KERBALISM_EXPERIMENT_Radiation_DresInSpaceHigh = Dans l'astéroïde, personne ne vous entend facepalm quand vous réalisez que vous avez oublié le compteur Geiger.
		#KERBALISM_EXPERIMENT_Radiation_JoolInSpaceHigh = La radiation émise par Jool est d'une ampleur stupéfiante, et vous commencez à souhaiter être sur la mission d'exploration de Duna.
		#KERBALISM_EXPERIMENT_Radiation_LaytheInSpaceHigh = Laythe, incroyablement, oppose une forte résistance à l'assaut de la ceinture de radiation de Jool. Bonne chance, Laythe. Bonne chance.
		#KERBALISM_EXPERIMENT_Radiation_VallInSpaceHigh = Même si Vall n'est pas située dans la ceinture de radiation principale, elle est violemment frappée par la radiation de Jool.
		#KERBALISM_EXPERIMENT_Radiation_TyloInSpaceHigh = La radiation de Jool forme une ceinture intense autour de Tylo, mais heureusement il ne semble pas qu'une grande quantité atteigne la surface. Mais « grande » est un terme relatif.
		#KERBALISM_EXPERIMENT_Radiation_BopInSpaceHigh = Bop semble en fait être une source de radiation intense, mais au milieu du champ de radiation de Jool, cela n'apparaît pas significatif.
		#KERBALISM_EXPERIMENT_Radiation_PolInSpaceHigh = Pol est assez loin de Jool pour recevoir des isotopes ionisés provenant de la magnétosphère de Jool et du gaz interplanétaire.
		#KERBALISM_EXPERIMENT_Radiation_EelooInSpaceHigh = Alors que l'influence de Kerbol faiblit, la radiation interstellaire devient beaucoup plus prononcée. Les secrets de la galaxie s'ouvrent à vous.

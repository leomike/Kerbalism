		#KERBALISM_BranchLoc_Split_Alumina_for_Metals_and_Oxygen_gas_An_actua = Séparer l'<b>Alumina</b> pour obtenir des <b>Metals</b> et du gaz <b>Oxygen</b>. Une ressource Aluminium existe, mais n'est pas utilisée actuellement. L'oxygène est utile pour la respiration et les propulseurs, tandis que les Metals peuvent être transformés en pièces de fusée ou servir à imprimer et recharger des propulseurs hybrides à propergol solide.
		#KERBALISM_BranchLoc_Suprisingly_Monazite_is_fairly_common_and_is_ful = Étonnamment, la <b>Monazite</b> est assez commune et regorge de <b>RareMetals</b> et d'<b>Oxygen</b>. Il y a toujours place pour des matériaux utiles.
		#KERBALISM_BranchLoc_Silicates_are_good_for_two_things_Silicon_for_co = Les <b>Silicates</b> servent à deux choses : le <b>Silicon</b> pour les composants informatiques, et l'<b>Oxygen</b> pour presque tout le reste. Pour l'instant, nous nous intéressons surtout à l'oxygène.
		#KERBALISM_BranchLoc_Split_Spodumene_extended_desc = Séparer le <b>Spodumene</b> pour obtenir du <b>Lithium</b>, de l'<b>Aluminium</b> et des <b>Silicates</b>. L'Aluminium est utile pour l'impression et le rechargement de propulseurs hybrides à propergol solide.
		#KERBALISM_BranchLoc_Extract_Oxygen_from_Ore_MRE_desc = Extraire de l'<b>Oxygen</b>, du <b>CarbonDioxide</b> et du <b>Shielding</b> à partir de <b>Ore</b>. Si nécessaire, le <b>CarbonDioxide</b> et/ou le <b>Shielding</b> seront évacués pour poursuivre l'extraction d'<b>Oxygen</b>.

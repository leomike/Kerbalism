		#KERBALISM_NitrogenPump_title = 질소 펌프
		#KERBALISM_AmmoniaPump_title = 암모니아 펌프

		#KERBALISM_SupplyContainer_desc = 균형 잡힌 <b>Food</b>와 <b>Water</b> 보급을 저장합니다.
		#KERBALISM_SupplyContainer_desc2 = 고체 및 액체 유기 <b>Waste</b>를 저장합니다

		#KERBALISM_PressurizedTank_title = 가압 탱크

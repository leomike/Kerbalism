		#KERBALISM_MonopropO2FuelCell_title = 단일추진제+O2 연료전지
		#KERBALISM_MonopropO2FuelCell_desc = <b>MonoPropellant</b>와 <b>Oxygen</b> 가스를 연소하여 <b>Water</b>와 <b>Nitrogen</b> 가스를 부산물로 생성하는 비상 연료전지입니다
		#KERBALISM_MonopropO2FuelCell_desc2 = <b>MonoPropellant</b>와 <b>Oxygen</b> 가스를 연소하여 <b>Water</b>와 <b>Nitrogen</b> 가스를 부산물로 생성합니다.
		#KERBALISM_H2O2FuelCell_title = H2+O2 연료전지
		#KERBALISM_H2O2FuelCell_desc = <b>Hydrogen</b> 가스와 <b>Oxygen</b> 가스를 연소하여 <b>Water</b>를 부산물로 생성합니다.

		#KERBALISM_Harvester_title = 채취기
		#KERBALISM_FuelCell_title = 연료전지
		#KERBALISM_FuelCell_desc = 태양광 패널보다 효율은 낮지만 훨씬 믿을 만합니다. <b>Hydrogen</b>과 <b>Oxygen</b>을 태워 ElectricCharge와 약간의 <b>Water</b>를 만듭니다. 비상시에는 <b>MonoPropellant</b>과 <b>Oxygen</b>도 태울 수 있으며, 부산물은 <b>Water</b>와 <b>Nitrogen</b>입니다. 엔지니어들은 그 물을 마셔도 된다고 우깁니다. 승무원은 정식으로 항의했습니다.

		#KERBALISM_Comfort_panorama_desc = 큐폴라는 우주의 공허를 편안하게 조망할 수 있는 파노라마 뷰를 제공합니다.
		#KERBALISM_Comfort_plants_desc = 덕트 테이프와 커벌 공학의 기적으로만 살아 있는 인공 자연은 본질적으로 마음을 진정시킵니다. 승무원이 너무 깊이 생각하지 않기를 바랍니다.
		#KERBALISM_Comfort_exercise_desc = 무중력에서 운동할 수 있도록 설계된 러닝머신이 포함되어 있습니다. 승무원이 좋아할 것입니다.
		#KERBALISM_Comfort_lowg_exercise_desc = 저중력 운동 장비가 포함되어 있습니다. 승무원이 좋아할 것입니다.
		#KERBALISM_Comfort_centrifuge_desc = 중력을 모사하는 회전 시스템이 포함되어 있습니다. 승무원이 좋아할 것입니다.
		#KERBALISM_Comfort_observation_desc = 최고의 우주 관측 경험.
		#KERBALISM_Comfort_Treadmill_title = 러닝머신
		#KERBALISM_Comfort_Shower_title = 샤워
		#KERBALISM_Comfort_Shower_desc = 이것은 샤워가 아닙니다—눈을 감고 믿으세요. 마른 냅킨을 특수 포장에 넣고 선내 급수기의 온수로 채웁니다. 냅킨이 적시면 포장을 뜯고 직접 만든 물티슈로 '샤워'합니다.
		#KERBALISM_Comfort_Laundry_title = 세탁
		#KERBALISM_Comfort_Laundry_desc = 일본 엔지니어가 만든 정교한 세탁 장치입니다. 사용은 본인 책임이며, 물을 폐수로 바꿀 수 있습니다.


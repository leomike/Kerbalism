		//Radiation Scan
		#KERBALISM_EXPERIMENT_Radiation_title = 방사선 스캔
		//Experiment results
		#KERBALISM_EXPERIMENT_Radiation_default = 이런, 이 결과는 정말 놀랍습니다!.
		#KERBALISM_EXPERIMENT_Radiation_MohoSrfLanded = 가이거 카운터도 Moho에 용암이 있으면 더 시원할 거라고 동의합니다. KSC는 가이거 카운터와 대화하는 것을 엄격히 금지했습니다.
		#KERBALISM_EXPERIMENT_Radiation_EveSrfLanded = Eve 표면에서는 높은 방사선이 걱정할 일이 아닌 것 같습니다.
		#KERBALISM_EXPERIMENT_Radiation_GillySrfLanded = 방사선 수준을 확인하기엔 뛰어다니는 재미에 너무 빠져 있습니다.
		#KERBALISM_EXPERIMENT_Radiation_KerbinSrfLanded = Kerbin의 방사선 수준은 말 그대로 정상입니다. 무언가가 방사선을 막고 있는 것 같습니다.
		#KERBALISM_EXPERIMENT_Radiation_MunSrfLanded = Mun 표면의 방사선은 상당히 높아, 향후 거주 시설에는 더 많은 차폐가 필요합니다.
		#KERBALISM_EXPERIMENT_Radiation_MinmusSrfLanded = 방사선 수준을 보니 Minmus 표면을 맛본 것을 후회합니다.
		#KERBALISM_EXPERIMENT_Radiation_DunaSrfLanded = 이 결과는 Duna 식민지 개발에 매우 중요합니다. 무슨 일이 생기면 정말 아까울 텐데…
		#KERBALISM_EXPERIMENT_Radiation_IkeSrfLanded = 표면에는 미량의 방사성 화합물이 있으며, R&D는 이것이 태양풍과 Duna 대기의 상호작용으로 생성된 원소라고 믿습니다.
		#KERBALISM_EXPERIMENT_Radiation_DresSrfLanded = 이 결과를 표면 시료와 대조해 보면, Dres는 많은 양의 중금속과 방사성 금속으로 이루어진 것 같습니다
		#KERBALISM_EXPERIMENT_Radiation_LaytheSrfLanded = Laythe의 대기와 활동적인 핵은 Jool의 강한 방사선 벨트로부터 표면을 보호하지만, 배경 방사선은 Kerbin보다 훨씬 높습니다
		#KERBALISM_EXPERIMENT_Radiation_VallSrfLanded = Vall은 Jool의 방사선 벨트에 있지 않아 다행이지만, 표면 방사선은 여전히 상당합니다.
		#KERBALISM_EXPERIMENT_Radiation_TyloSrfLanded = Tylo의 자기권은 Jool 방사선의 대부분을 막을 만큼 충분하지만, 대기가 없어 상당한 방사선이 여전히 표면에 도달합니다
		#KERBALISM_EXPERIMENT_Radiation_BopSrfLanded = KSC는 궤도에서 발견한 강한 방사선 원을 찾으려 하지 말라고 경고합니다.
		#KERBALISM_EXPERIMENT_Radiation_PolSrfLanded = Pol에는 수천 년간 Jool이 퇴적시킨 방사성 수소와 헬륨 동위원소가 많이 포함된 것 같습니다.
		#KERBALISM_EXPERIMENT_Radiation_EelooSrfLanded = Kerbol에서 이렇게 멀리 떨어져도 성간 방사선이 표면에 많이 도달합니다. 앞으로 연구하기 좋은 곳입니다

		#KERBALISM_EXPERIMENT_Radiation_EveFlyingLow = Eve의 두꺼운 대기와 큰 자기권이 이 고도까지 방사선이 도달하지 못하게 막습니다.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingLow = 로켓의 진동으로 다이얼을 읽을 수 없어, 결과를 지어내기로 합니다.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingLow = 대기가 예상보다 더 많은 방사선을 차단하는 것 같습니다. 향후 Duna 임무에 좋은 징조입니다.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingLow = 가이거 카운터를 확인하려 했지만, 대기권 밖으로 나가기 전까지는 수치를 표시하지 않습니다.
		#KERBALISM_EXPERIMENT_Radiation_LaytheFlyingLow = 아래 바다에서 예상치 못한 양의 방사선이 방출되고 있습니다.
		#KERBALISM_EXPERIMENT_Radiation_EveFlyingHigh = 대기에서 타지 않도록 하느라 가이거 카운터를 볼 여유가 없습니다.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingHigh = 고공에서도 대기가 대부분의 방사선을 흡수합니다.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingHigh = 이곳 대기에서 많은 양의 이온화 입자가 방출되고 있습니다.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingHigh = KSC는 당신의 제3의 눈이 완전히 정상이라고 보장합니다.
		#KERBALISM_EXPERIMENT_Radiation_LaytheFlyingHigh = Jool의 방사선이 Laythe 대기를 폭격할 때 흥미로운 부산물이 생성됩니다
		#KERBALISM_EXPERIMENT_Radiation_SunInSpaceLow = 9000을 넘었습니다!!
		#KERBALISM_EXPERIMENT_Radiation_MohoInSpaceLow = R&D는 이 결과가 과학적 돌파구에 기여했다고 알려줍니다. 당신은 에어컨을 껴안느라 신경 쓸 겨를이 없습니다.
		#KERBALISM_EXPERIMENT_Radiation_EveInSpaceLow = Eve 대기가 이상한 이온을 방출해 측정값을 흐트러뜨립니다.
		#KERBALISM_EXPERIMENT_Radiation_GillyInSpaceLow = Gilly의 이심 궤도와 Eve의 자기권 때문에 여기서 방사선 수준이 변동합니다.
		#KERBALISM_EXPERIMENT_Radiation_KerbinInSpaceLow = 그곳의 방사선 환경은 생각보다 복잡합니다. R&D가 연구할 새 소재가 될 것입니다.
		#KERBALISM_EXPERIMENT_Radiation_MunInSpaceLow = Mun의 암면을 지날 때 안정적인 방사선 펄스가 보입니다. 아마 아무것도 아닐 겁니다.
		#KERBALISM_EXPERIMENT_Radiation_MinmusInSpaceLow = 결과에 따르면 Minmus의 얼음 지각 안에 많은 방사성 화합물이 섞여 있습니다.
		#KERBALISM_EXPERIMENT_Radiation_DunaInSpaceLow = 태양이 Duna의 연약한 대기를 박리하고 있으며, Duna는 이온화 입자류를 방출하고 있습니다.
		#KERBALISM_EXPERIMENT_Radiation_IkeInSpaceLow = Ike의 근접 궤도와 조석 고정 때문에 Duna를 향한 면 위에서는 방사선 수준이 크게 떨어집니다.
		#KERBALISM_EXPERIMENT_Radiation_DresInSpaceLow = 가이거 카운터가 Dres에서 오는 많은 방사선을 감지했습니다.
		#KERBALISM_EXPERIMENT_Radiation_JoolInSpaceLow = KSC는 나머지 Kerbals를 오염시킬까 두려워 귀환을 허용하지 않을 것이라고 권고합니다
		#KERBALISM_EXPERIMENT_Radiation_LaytheInSpaceLow = 아래 아름다운 바다를 내려다보다, 서서히 방사능 중독으로 죽어가고 있음을 잊습니다.
		#KERBALISM_EXPERIMENT_Radiation_VallInSpaceLow = 놀랍게도 방사선 수준은 합리적인 수준입니다.
		#KERBALISM_EXPERIMENT_Radiation_TyloInSpaceLow = Tylo의 미세한 자기권이 발전기처럼 작용해 Jool의 이미 강한 방사선장을 증폭합니다.
		#KERBALISM_EXPERIMENT_Radiation_BopInSpaceLow = Bop에는 비정상적으로 높은 방사선이 있으며, 북위 68도, 동경 114도를 가리키는 것 같습니다. 이상하네요
		#KERBALISM_EXPERIMENT_Radiation_PolInSpaceLow = Pol 주변 공간은 Jool 자기권에 붙잡힌 불운한 방사성 이온으로 가득합니다.
		#KERBALISM_EXPERIMENT_Radiation_EelooInSpaceLow = R&D는 많은 성간 방사선이 Eeloo 표면에 미친 영향을 연구하고 싶어 합니다.
		#KERBALISM_EXPERIMENT_Radiation_SunInSpaceHigh = KSC는 차폐재를 추가하는 것을 *아마도* 잊었다고 알려줍니다.
		#KERBALISM_EXPERIMENT_Radiation_MohoInSpaceHigh = 여정 내내 태양 방사선이 급격히 증가했습니다.
		#KERBALISM_EXPERIMENT_Radiation_EveInSpaceHigh = Eve의 방사선 벨트를 통과하는 것이 기대되지 않습니다.
		#KERBALISM_EXPERIMENT_Radiation_GillyInSpaceHigh = KSC가 감자 농담을 그만두지 않으면 방사선 수준을 확인하기를 거부합니다.
		#KERBALISM_EXPERIMENT_Radiation_KerbinInSpaceHigh = 이곳은 위험합니다.
		#KERBALISM_EXPERIMENT_Radiation_MunInSpaceHigh = Kerbin 방사선 벨트를 통과했는데 죽지 않았습니다. 이게 미친 음모론을 낳을까 걱정됩니다.
		#KERBALISM_EXPERIMENT_Radiation_MinmusInSpaceHigh = 비정상적인 방사선을 감지했지만 출처를 알 수 없습니다.
		#KERBALISM_EXPERIMENT_Radiation_DunaInSpaceHigh = Duna에는 자기권이 없는 것 같아, 우주 방사선이 향후 Duna 임무의 문제가 될 것입니다.
		#KERBALISM_EXPERIMENT_Radiation_IkeInSpaceHigh = 뜻밖에도 Ike는 Duna 대기에서 박리된 이온을 교란할 만큼 자성이 있는 것 같습니다.
		#KERBALISM_EXPERIMENT_Radiation_DresInSpaceHigh = 소행성에서는 가이거 카운터를 가져오는 것을 잊었다는 사실을 깨달았을 때 아무도 당신의 페이스팜을 들을 수 없습니다.
		#KERBALISM_EXPERIMENT_Radiation_JoolInSpaceHigh = Jool에서 방출되는 방사선은 엄청난 양이며, Duna 탐사 임무에 있었으면 좋겠다고 생각하기 시작합니다.
		#KERBALISM_EXPERIMENT_Radiation_LaytheInSpaceHigh = 놀랍게도 Laythe는 Jool 방사선 벨트의 맹공에 큰 저항을 보이고 있습니다. 행운을 빕니다, Laythe. 행운을.
		#KERBALISM_EXPERIMENT_Radiation_VallInSpaceHigh = Vall은 주 방사선 벨트에 있지 않지만, Jool 방사선에 여전히 가혹하게 시달립니다.
		#KERBALISM_EXPERIMENT_Radiation_TyloInSpaceHigh = Jool 방사선이 Tylo 주위에 강한 벨트를 형성하지만, 다행히 표면에 도달하는 양은 많지 않아 보입니다. 물론 '많다'는 상대적인 말입니다.
		#KERBALISM_EXPERIMENT_Radiation_BopInSpaceHigh = Bop은 강한 방사선 원인 것 같지만, Jool 방사선장 안에서는 그다지 두드러지지 않습니다.
		#KERBALISM_EXPERIMENT_Radiation_PolInSpaceHigh = Pol은 Jool에서 충분히 멀어 Jool 자기권과 행성간 가스에서 유래한 이온화 동위원소를 받습니다.
		#KERBALISM_EXPERIMENT_Radiation_EelooInSpaceHigh = Kerbol의 영향이 약해지면서 성간 방사선이 훨씬 뚜렷해집니다. 은하의 비밀이 당신 앞에 열립니다.

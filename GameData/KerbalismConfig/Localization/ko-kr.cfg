		#KERBALISM_EXPERIMENT_SHAKE_desc = 표면 수화 운동 노출 분석: 커발 엔지니어들이 지진 활동으로 음료를 흔들 수 있는지 테스트합니다.
		#KERBALISM_EXPERIMENT_CURVE_title = 고층 대기 프로파일

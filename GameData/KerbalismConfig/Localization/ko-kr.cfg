		#kerbalism-activeshield_Part_manufacturer = TripleZeta Workshops
		#kerbalism-activeshield_Part_title = 능동 차폐

		// ********** Part: kerbalism-antenna
		#kerbalism-antenna_Part_description = 젊고 영감에 가득 찬 베른허 폰 커먼이 오래전에 설계했으나, 이후 그의 관심은 대량살상무기 개발로 옮겨졌습니다.
		#kerbalism-antenna_Part_manufacturer = Ionic Symphonic Protonic Electronics
		#kerbalism-antenna_Part_title = Communotron 8

		// ********** Part: kerbalism-chemicalplant
		#kerbalism-chemicalplant_Part_description = 소형 서비스 베이에 들어갈 수 있는 다목적 화학 공장입니다. Convert-O-Tron과의 유사성은 순전히 우연입니다.
		#kerbalism-chemicalplant_Part_manufacturer = Rookies Inc.
		#kerbalism-chemicalplant_Part_title = 화학 공장

		// ********** Part: kerbalism-container-inline-0625
		#kerbalism-container-inline-0625_Part_description = 굶주림을 피하는 합법적인 대안입니다.
		#kerbalism-container-inline-0625_Part_manufacturer = Nazari Storage Services
		#kerbalism-container-inline-0625_Part_title = 보급 컨테이너, 0.625m

		// ********** Part: kerbalism-container-inline-125
		#kerbalism-container-inline-125_Part_description = JPL의 한 직원이 간단하고 훌륭한 아이디어를 냈습니다: 더 큰 컨테이너에 더 많은 보급품을 담자. 수천 인·월과 3억 달러의 예산이 투입된 끝에 시제품이 조기 시험을 받을 준비가 되었습니다.
		#kerbalism-container-inline-125_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-125_Part_title = 보급 컨테이너, 1.25m

		// ********** Part: kerbalism-container-inline-250
		#kerbalism-container-inline-250_Part_description = 이전 세대 우주급 보급 컨테이너의 사치스러운 낭비 이후, 재정 부서는 더 큰 것을 개발하는 데 자금을 대주기를 꺼렸습니다. 한 사무원이 '그냥 우주에 사람을 보내는 것'의 이유에 불평하자, JPL은 전쟁 모드로 전환해 관련 관료들을 협박해 굴복시켰고, 프로젝트는 곧 승인되었습니다.
		#kerbalism-container-inline-250_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-250_Part_title = 보급 컨테이너, 2.5m

		// ********** Part: kerbalism-container-inline-375

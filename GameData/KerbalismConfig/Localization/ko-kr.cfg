		#KERBALISM_WasteProcessor_title = 폐기물 처리기
		#KERBALISM_WasteProcessor_desc = 분해되는 유기 <b>Waste</b>에서 <b>Ammonia</b>를 추출합니다.
		#KERBALISM_WasteIncinerator_title = 폐기물 소각로
		#KERBALISM_WasteIncinerator_desc = <b>Waste</b>와 <b>Oxygen</b>을 연소하여 <b>CarbonDioxide</b>와 <b>Water</b>를 생성합니다. 소형 배기 터빈 발전기가 포함되어 있습니다. 필요 시 <b>Water</b>를 배출하여 <b>CarbonDioxide</b> 추출을 계속합니다.
		#KERBALISM_WasteCompressor_title = 폐기물 압축기

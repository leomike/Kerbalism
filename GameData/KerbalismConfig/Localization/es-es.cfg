		// ********** Part: kerbalism-container-inline-125
		#kerbalism-container-inline-125_Part_description = Uno de los muchachos de JPL tuvo una idea simple y brillante: contenedores más grandes para almacenar más suministros. Después de un par de miles de meses-hombre y 300 millones en financiamiento, el prototipo estaba listo para las primeras pruebas.

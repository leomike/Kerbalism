		// ********** Part: kerbalism-antenna
		#kerbalism-antenna_Part_description = Diseñado hace mucho tiempo por un joven e inspirado Wernher von Kerman, antes de que su enfoque cambiara al desarrollo de armas de destrucción masiva.
		#kerbalism-antenna_Part_manufacturer = Ionic Symphonic Protonic Electronics
		#kerbalism-antenna_Part_title = Communotron 8

		// ********** Part: kerbalism-chemicalplant
		#kerbalism-chemicalplant_Part_description = Una planta química versátil que puede caber en la pequeña bahía de servicio. Cualquier similitud con el Convert-O-Tron es pura coincidencia.
		#kerbalism-chemicalplant_Part_manufacturer = Rookies Inc.
		#kerbalism-chemicalplant_Part_title = Planta química


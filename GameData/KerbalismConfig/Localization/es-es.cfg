		// ********** Part: kerbalism-activeshield
		#kerbalism-activeshield_Part_description = Genera un campo magnético alrededor del vehículo, reduciendo la radiación entrante. El efecto es significativo solo en relación con los niveles de radiación encontrados en el vuelo interplanetario, y hará poco o nada dentro de los cinturones de partículas supercargadas o durante las tormentas solares.

		#KERBALISM_EXPERIMENT_Radiation_title = Escaneo de radiación
		//Experiment results
		#KERBALISM_EXPERIMENT_Radiation_default = ¡Vaya, estos resultados son increíbles!
		#KERBALISM_EXPERIMENT_Radiation_MohoSrfLanded = El contador Geiger coincide en que Moho sería más genial con lava. El KSC te ha informado de que hablar con el contador Geiger está estrictamente prohibido.
		#KERBALISM_EXPERIMENT_Radiation_EveSrfLanded = Parece que los altos niveles de radiación son lo único de lo que no tienes que preocuparte en la superficie de Eve.
		#KERBALISM_EXPERIMENT_Radiation_GillySrfLanded = Te lo estás pasando demasiado bien rebotando como para comprobar los niveles de radiación.
		#KERBALISM_EXPERIMENT_Radiation_KerbinSrfLanded = Los niveles de radiación aquí en Kerbin son, literalmente, nominales. Algo debe estar bloqueando la radiación.
		#KERBALISM_EXPERIMENT_Radiation_MunSrfLanded = La radiación en la superficie de la Mun es bastante alta; cualquier futura habitación requeriría más blindaje.
		#KERBALISM_EXPERIMENT_Radiation_MinmusSrfLanded = Al mirar los niveles de radiación, te arrepientes de haber probado la superficie de Minmus.
		#KERBALISM_EXPERIMENT_Radiation_DunaSrfLanded = Estos resultados son críticos para el desarrollo de una colonia en Duna. Sería una lástima que les pasara algo...
		#KERBALISM_EXPERIMENT_Radiation_IkeSrfLanded = La superficie contiene una cantidad mínima de compuestos radiactivos; I+D cree que son elementos creados por interacciones entre el viento solar y la atmósfera de Duna.
		#KERBALISM_EXPERIMENT_Radiation_DresSrfLanded = Cruzando estos resultados con muestras de superficie, Dres parece consistir en una gran cantidad de metales pesados radiactivos
		#KERBALISM_EXPERIMENT_Radiation_LaytheSrfLanded = La atmósfera y el núcleo activo de Laythe protegen su superficie del intenso cinturón de radiación de Jool, pero la radiación de fondo es significativamente mayor que la de Kerbin
		#KERBALISM_EXPERIMENT_Radiation_VallSrfLanded = Vall tiene la suerte de no estar situada en el cinturón de radiación de Jool, pero la radiación en la superficie sigue siendo significativa.
		#KERBALISM_EXPERIMENT_Radiation_TyloSrfLanded = La magnetosfera funcional que posee Tylo basta para proteger el planeta de la mayor parte de la radiación de Jool, pero su falta de atmósfera significa que una cantidad significativa de radiación aún llega a la superficie
		#KERBALISM_EXPERIMENT_Radiation_BopSrfLanded = El KSC advierte contra intentar localizar la intensa fuente de radiación que avistaron desde la órbita.
		#KERBALISM_EXPERIMENT_Radiation_PolSrfLanded = Parece que Pol contiene una gran cantidad de isótopos radiactivos de hidrógeno y helio, depositados por Jool a lo largo de miles de años.
		#KERBALISM_EXPERIMENT_Radiation_EelooSrfLanded = Tan lejos de Kerbol, mucha más radiación interestelar llega a la superficie. Sería un lugar estupendo para futuros estudios

		#KERBALISM_EXPERIMENT_Radiation_EveFlyingLow = La densa atmósfera de Eve y su gran magnetosfera impiden que cualquier radiación llegue a esta altitud.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingLow = Las vibraciones de tu cohete hacen ilegibles los diales, así que decides inventarte los resultados.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingLow = La atmósfera parece bloquear más radiación de lo previsto originalmente. Esto augura bien para futuras misiones a Duna.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingLow = Vas a comprobar el contador Geiger, pero se niega a mostrar una lectura hasta que lo saques de la atmósfera.
		#KERBALISM_EXPERIMENT_Radiation_LaytheFlyingLow = Los océanos de abajo emiten una cantidad inesperada de radiación.
		#KERBALISM_EXPERIMENT_Radiation_EveFlyingHigh = Estás demasiado ocupado intentando no incinerarte en la atmósfera como para mirar el contador Geiger.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingHigh = La atmósfera absorbe la mayor parte de la radiación, incluso allí arriba.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingHigh = La atmósfera aquí emite grandes cantidades de partículas ionizadas.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingHigh = El KSC ha asegurado que tu tercer ojo es completamente normal.

		// ********** Part: kerbalism-container-inline-250
		#kerbalism-container-inline-250_Part_description = Después de los excesos extravagantes de la generación anterior de contenedores de suministro de tipo espacial, el departamento fiscal no estaba muy contento de financiar el desarrollo de uno aún más grande. Cuando uno de los empleados se quejó de la razón detrás de "poner a los kerbals en el espacio por el simple hecho de hacerlo", JPL cambió al modo-guerra y chantajeó a todos los burócratas involucrados para que se sometieran. Y el proyecto fue rápidamente aprobado.

		#kerbalism-container-inline-250_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-250_Part_title = Contenedor de Suministro Grande

		// ********** Part: kerbalism-container-inline-375
		#kerbalism-container-inline-375_Part_description = Desde el principio quedó claro que 3.75m era el tamaño ideal para las misiones en el espacio profundo, pero el costo de diseño era prohibitivo. La solución inesperada llegó cuando un día los chicos del taller intentaron armar un Contenedor de Suministros Grande usando planos incorrectos.
		#kerbalism-container-inline-375_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-375_Part_title = Contenedor de Suministro Enorme


		// ********** Part: kerbalism-activeshield
		#kerbalism-activeshield_Part_description = Gera um campo magnético ao redor da nave, reduzindo a radiação recebida. O efeito é significativo apenas em relação aos níveis de radiação encontrados no vôo interplanetário, e fará pouco ou nada em cinturões de partículas supercarregadas ou durante tempestades solares.
		#kerbalism-activeshield_Part_manufacturer = TripleZeta Workshops
		#kerbalism-activeshield_Part_title = Escudo Ativo

		// ********** Part: kerbalism-antenna
		#kerbalism-antenna_Part_description = Projetada há muito tempo por um jovem e inspirado Wernher von Kerman, antes que seu foco se voltasse para o desenvolvimento de armas de destruição em massa.
		#kerbalism-antenna_Part_manufacturer = Ionic Symphonic Protonic Electronics
		#kerbalism-antenna_Part_title = Communotron 8

		// ********** Part: kerbalism-chemicalplant
		#kerbalism-chemicalplant_Part_description = Uma planta química versátil que pode caber na pequena área de serviço. Qualquer semelhança com o Convert-O-Tron é mera coincidência.
		#kerbalism-chemicalplant_Part_manufacturer = Rookies Inc.
		#kerbalism-chemicalplant_Part_title = Planta Química

		// ********** Part: kerbalism-container-inline-0625
		#kerbalism-container-inline-0625_Part_description = Uma alternativa válida para não morrer de fome.
		#kerbalism-container-inline-0625_Part_manufacturer = Nazari Storage Services
		#kerbalism-container-inline-0625_Part_title = Recipiente de Provisões Pequeno

		// ********** Part: kerbalism-container-inline-125
		#kerbalism-container-inline-125_Part_description = Um dos caras do JPL tinha uma ideia simples e brilhante: recipientes maiores para armazenar mais provisões. Depois de alguns milhares de horas de trabalho e 300 milhões em financiamentos, o protótipo estava pronto para testes iniciais.
		#kerbalism-container-inline-125_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-125_Part_title = Recipiente de Provisões

		// ********** Part: kerbalism-container-inline-250
		#kerbalism-container-inline-250_Part_description = Depois dos excessos extravagantes da geração anterior de contêineres de provisões espaciais, o departamento fiscal não ficou muito feliz em financiar o desenvolvimento de um ainda maior. Quando um dos funcionários se queixou da razão por trás de "colocar homens no espaço por causa disso", o JPL mudou para o modo de guerra e chantageou todos os burocratas envolvidos na submissão. E o projeto foi aprovado com seriedade.
		#kerbalism-container-inline-250_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-250_Part_title = Recipiente de Provisões Grande

		// ********** Part: kerbalism-container-inline-375
		#kerbalism-container-inline-375_Part_description = Ficou claro desde o início que 3,75m era o tamanho ideal para missões espaciais, mas o custo do projeto era proibitivo. A solução inesperada surgiu quando um dia os caras da oficina tentaram montar um Recipiente de Provisões Grande usando desenhos errados.
		#kerbalism-container-inline-375_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-375_Part_title = Recipiente de Provisões Enorme


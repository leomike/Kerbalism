		//Experiment results
		#KERBALISM_EXPERIMENT_Radiation_default = Caramba, esses resultados são incríveis!.
		#KERBALISM_EXPERIMENT_Radiation_MohoSrfLanded = O contador Geiger concorda que Moho ficaria mais legal com lava. O KSC informou que conversar com o contador Geiger é estritamente proibido.
		#KERBALISM_EXPERIMENT_Radiation_EveSrfLanded = Parece que altos níveis de radiação são a única coisa com que você não precisa se preocupar na superfície de Eve.
		#KERBALISM_EXPERIMENT_Radiation_GillySrfLanded = Você está se divertindo demais pulando por aí para verificar os níveis de radiação.
		#KERBALISM_EXPERIMENT_Radiation_KerbinSrfLanded = Os níveis de radiação são literalmente nominais aqui em Kerbin. Algo deve estar bloqueando a radiação.
		#KERBALISM_EXPERIMENT_Radiation_MunSrfLanded = A radiação na superfície da Mun é bastante alta; qualquer habitação futura exigiria mais blindagem.
		#KERBALISM_EXPERIMENT_Radiation_MinmusSrfLanded = Olhando os níveis de radiação, você se arrepende de ter provado a superfície de Minmus.
		#KERBALISM_EXPERIMENT_Radiation_DunaSrfLanded = Esses resultados são críticos para o desenvolvimento de uma colônia em Duna. Seria uma pena se algo acontecesse com eles...
		#KERBALISM_EXPERIMENT_Radiation_IkeSrfLanded = A superfície contém uma quantidade vestigial de compostos radioativos; P&D acredita que são elementos criados por interações entre o vento solar e a atmosfera de Duna.
		#KERBALISM_EXPERIMENT_Radiation_DresSrfLanded = Cruzando esses resultados com amostras da superfície, Dres parece consistir em uma grande quantidade de metais pesados e radioativos
		#KERBALISM_EXPERIMENT_Radiation_LaytheSrfLanded = A atmosfera e o núcleo ativo de Laythe protegem sua superfície do intenso cinturão de radiação de Jool, mas a radiação de fundo é significativamente maior que a de Kerbin
		#KERBALISM_EXPERIMENT_Radiation_VallSrfLanded = Vall tem a sorte de não estar localizada no cinturão de radiação de Jool, mas a radiação na superfície ainda é significativa.
		#KERBALISM_EXPERIMENT_Radiation_TyloSrfLanded = A magnetosfera funcional que Tylo possui é suficiente para proteger o planeta da maior parte da radiação de Jool, mas a falta de atmosfera significa que uma quantidade significativa de radiação ainda atinge a superfície
		#KERBALISM_EXPERIMENT_Radiation_BopSrfLanded = O KSC alerta contra tentar localizar a intensa fonte de radiação que avistaram da órbita.
		#KERBALISM_EXPERIMENT_Radiation_PolSrfLanded = Parece que Pol contém uma grande quantidade de isótopos radioativos de Hidrogênio e Hélio, depositados por Jool ao longo de milhares de anos.
		#KERBALISM_EXPERIMENT_Radiation_EelooSrfLanded = Tão longe de Kerbol, muito mais radiação interestelar atinge a superfície. Este seria um ótimo lugar para estudos futuros

		#KERBALISM_EXPERIMENT_Radiation_EveFlyingLow = A atmosfera espessa e a grande magnetosfera de Eve impedem que qualquer radiação atinja esta altitude.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingLow = As vibrações do seu foguete tornam os mostradores ilegíveis, então você decide inventar os resultados.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingLow = A atmosfera parece bloquear mais radiação do que o previsto originalmente. Isso é um bom sinal para futuras missões a Duna.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingLow = Você vai verificar o contador Geiger, mas ele se recusa a exibir uma leitura até você tirá-lo da atmosfera.
		#KERBALISM_EXPERIMENT_Radiation_LaytheFlyingLow = Os oceanos abaixo emitem uma quantidade inesperada de radiação.

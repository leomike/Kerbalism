		// ********** Part: kerbalism-antenna
		#kerbalism-antenna_Part_description = Vor langer Zeit von einem jungen und inspirierten Wernher von Kerman entworfen, bevor sich sein Fokus auf die Entwicklung von Massenvernichtungswaffen verlagerte.
		#kerbalism-antenna_Part_manufacturer = Ionic Symphonic Protonic Electronics
		#kerbalism-antenna_Part_title = Communotron 8

		// ********** Part: kerbalism-chemicalplant
		#kerbalism-chemicalplant_Part_description = Eine vielseitige Chemiefabrik, die in die kleine Servicebucht passt. Ähnlichkeiten mit dem Convert-O-Tron sind rein zufällig.
		#kerbalism-chemicalplant_Part_manufacturer = Rookies Inc.
		#kerbalism-chemicalplant_Part_title = Chemiefabrik

		// ********** Part: kerbalism-container-inline-0625
		#kerbalism-container-inline-0625_Part_description = Eine gute Alternative zum Verhungern.
		#kerbalism-container-inline-0625_Part_manufacturer = Nazari Storage Services
		#kerbalism-container-inline-0625_Part_title = Vorratsbehälter, 0.625m

		// ********** Part: kerbalism-container-inline-125
		#kerbalism-container-inline-125_Part_description = Einer der Jungs von JPL hatte eine einfache und geniale Idee: größere Behälter, um mehr Vorräte zu lagern. Nach ein paar tausend Monaten (rechnerisch) und 300 Millionen Spenden war der Prototyp bereit für frühe Tests.
		#kerbalism-container-inline-125_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-125_Part_title = Vorratsbehälter, 1.25m

		// ********** Part: kerbalism-container-inline-250
		#kerbalism-container-inline-250_Part_description = Nach den extravaganten Exzessen der vorherigen Generation von weltraumfähigen Vorratsbehältern war die Finanzabteilung nicht sehr glücklich, die Entwicklung eines noch größeren zu finanzieren. Als sich einer der Angestellten über die Gründe dafür beschwerte, "Männer in den Weltraum zu schicken", wechselte JPL in den Kampfmodus und erpresste alle beteiligten Bürokraten und zwang sie so zum Gehorsam. Das Projekt wurde genehmigt.
		#kerbalism-container-inline-250_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-250_Part_title = Vorratsbehälter, 2.5m

		// ********** Part: kerbalism-container-inline-375
		#kerbalism-container-inline-375_Part_description = Es war von Anfang an klar, dass 3.75m die ideale Größe für Weltraummissionen waren, aber die Konstruktionskosten waren unerschwinglich. Die unerwartete Lösung kam, als die Jungs in der Werkstatt eines Tages versuchten, einen "Großer Vorratsbehälter" mit falschen Zeichnungen zu montieren.
		#kerbalism-container-inline-375_Part_manufacturer = Tygoo Transport Solutions
		#kerbalism-container-inline-375_Part_title = Vorratsbehälter, 3.75m


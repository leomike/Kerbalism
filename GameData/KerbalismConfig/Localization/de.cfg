		//Radiation Scan
		#KERBALISM_EXPERIMENT_Radiation_title = Strahlungsscan
		//Experiment results
		#KERBALISM_EXPERIMENT_Radiation_default = Heilige Kuh, diese Ergebnisse sind unglaublich!.
		#KERBALISM_EXPERIMENT_Radiation_MohoSrfLanded = Der Geigerzähler stimmt zu, dass Moho mit Lava cooler wäre. Das KSC hat Sie darüber informiert, dass es streng verboten ist, mit dem Geigerzähler zu sprechen.
		#KERBALISM_EXPERIMENT_Radiation_EveSrfLanded = Hohe Strahlungswerte scheinen das Einzige zu sein, worum man sich auf der Oberfläche von Eve keine Sorgen machen muss.
		#KERBALISM_EXPERIMENT_Radiation_GillySrfLanded = Sie haben zu viel Spaß beim Herumhüpfen, um die Strahlungswerte zu prüfen.
		#KERBALISM_EXPERIMENT_Radiation_KerbinSrfLanded = Die Strahlungswerte sind hier auf Kerbin buchstäblich nominal. Etwas muss die Strahlung blockieren.
		#KERBALISM_EXPERIMENT_Radiation_MunSrfLanded = Die Strahlung auf der Oberfläche des Mun ist ziemlich hoch; jede zukünftige Besiedlung würde mehr Abschirmung erfordern.
		#KERBALISM_EXPERIMENT_Radiation_MinmusSrfLanded = Beim Anblick der Strahlungswerte bereuen Sie, die Oberfläche von Minmus probiert zu haben.
		#KERBALISM_EXPERIMENT_Radiation_DunaSrfLanded = Diese Ergebnisse sind entscheidend für die Entwicklung einer Duna-Kolonie. Schade, wenn ihnen etwas zustoßen würde …
		#KERBALISM_EXPERIMENT_Radiation_IkeSrfLanded = Die Oberfläche enthält Spuren radioaktiver Verbindungen; F&E vermutet, dass es sich um Elemente handelt, die durch Wechselwirkungen zwischen Sonnenwind und Dunas Atmosphäre entstanden sind.
		#KERBALISM_EXPERIMENT_Radiation_DresSrfLanded = Im Abgleich mit Oberflächenproben scheint Dres aus großen Mengen schwerer, radioaktiver Metalle zu bestehen
		#KERBALISM_EXPERIMENT_Radiation_LaytheSrfLanded = Laythes Atmosphäre und aktiver Kern schützen die Oberfläche vor Jools intensivem Strahlungsgürtel, aber die Hintergrundstrahlung ist deutlich höher als auf Kerbin
		#KERBALISM_EXPERIMENT_Radiation_VallSrfLanded = Vall hat das Glück, nicht in Jools Strahlungsgürtel zu liegen, aber die Strahlung auf der Oberfläche ist dennoch erheblich.
		#KERBALISM_EXPERIMENT_Radiation_TyloSrfLanded = Die funktionierende Magnetosphäre von Tylo reicht aus, um den Planeten vor dem Großteil von Jools Strahlung zu schützen, aber mangels Atmosphäre erreicht dennoch eine erhebliche Menge Strahlung die Oberfläche
		#KERBALISM_EXPERIMENT_Radiation_BopSrfLanded = Das KSC warnt davor, versuchen zu wollen, die intensive Strahlungsquelle zu finden, die sie aus dem Orbit entdeckt haben.
		#KERBALISM_EXPERIMENT_Radiation_PolSrfLanded = Pol scheint große Mengen radioaktiver Wasserstoff- und Heliumisotope zu enthalten, die Jool über Jahrtausende abgelagert hat.
		#KERBALISM_EXPERIMENT_Radiation_EelooSrfLanded = So weit von Kerbol entfernt erreicht viel mehr interstellare Strahlung die Oberfläche. Ein hervorragender Ort für künftige Forschung

		#KERBALISM_EXPERIMENT_Radiation_EveFlyingLow = Eves dicke Atmosphäre und große Magnetosphäre verhindern, dass Strahlung diese Höhe erreicht.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingLow = Die Vibrationen Ihrer Rakete machen die Skalen unlesbar, also entscheiden Sie sich, die Ergebnisse zu erfinden.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingLow = Die Atmosphäre scheint mehr Strahlung zu blockieren als ursprünglich vorhergesagt. Das verheißt Gutes für künftige Duna-Missionen.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingLow = Sie wollen den Geigerzähler prüfen, aber er weigert sich, einen Wert anzuzeigen, bis Sie ihn aus der Atmosphäre herausnehmen.
		#KERBALISM_EXPERIMENT_Radiation_LaytheFlyingLow = Die Ozeane unter Ihnen strahlen eine unerwartet hohe Menge an Strahlung ab.
		#KERBALISM_EXPERIMENT_Radiation_EveFlyingHigh = Sie sind zu sehr damit beschäftigt, in der Atmosphäre nicht zu verbrennen, um auf den Geigerzähler zu schauen.
		#KERBALISM_EXPERIMENT_Radiation_KerbinFlyingHigh = Die Atmosphäre absorbiert den Großteil der Strahlung, selbst da oben.
		#KERBALISM_EXPERIMENT_Radiation_DunaFlyingHigh = Die Atmosphäre hier emittiert große Mengen ionisierter Teilchen.
		#KERBALISM_EXPERIMENT_Radiation_JoolFlyingHigh = Das KSC hat versichert, dass Ihr drittes Auge völlig normal ist.
		#KERBALISM_EXPERIMENT_Radiation_LaytheFlyingHigh = Die Strahlung von Jool erzeugt interessante Nebenprodukte, wenn sie Laythes Atmosphäre bombardiert
		#KERBALISM_EXPERIMENT_Radiation_SunInSpaceLow = Es sind über 9000!!
		#KERBALISM_EXPERIMENT_Radiation_MohoInSpaceLow = F&E teilt Ihnen mit, dass diese Ergebnisse zu einem wissenschaftlichen Durchbruch beigetragen haben. Sie sind zu sehr damit beschäftigt, die Klimaanlage zu umarmen, um sich darum zu kümmern.
		#KERBALISM_EXPERIMENT_Radiation_EveInSpaceLow = Eves Atmosphäre emittiert seltsame Ionen, die Ihre Messwerte verfälschen.
		#KERBALISM_EXPERIMENT_Radiation_GillyInSpaceLow = Die Strahlungswerte hier schwanken wegen Gillys exzentrischer Umlaufbahn und Eves Magnetosphäre.
		#KERBALISM_EXPERIMENT_Radiation_KerbinInSpaceLow = Die Strahlungsumgebung da oben ist komplexer als gedacht. Das sollte F&E etwas Neues zum Studieren geben.
		#KERBALISM_EXPERIMENT_Radiation_MunInSpaceLow = Sie bemerken einen gleichmäßigen Strahlungspuls, wenn Sie über die dunkle Seite des Mun fliegen. Wahrscheinlich nichts.
		#KERBALISM_EXPERIMENT_Radiation_MinmusInSpaceLow = Die Ergebnisse deuten darauf hin, dass Minmus große Mengen radioaktiver Verbindungen in seiner eisigen Kruste enthält.
		#KERBALISM_EXPERIMENT_Radiation_DunaInSpaceLow = Die Sonne reißt Dunas fragile Atmosphäre ab, während Duna einen Strom ionisierter Teilchen abgibt.
		#KERBALISM_EXPERIMENT_Radiation_IkeInSpaceLow = Ikes enge Umlaufbahn und gebundene Rotation bedeuten, dass die Strahlungswerte immens sinken, wenn Sie über der Ike-Seite sind, die Duna zugewandt ist.
		#KERBALISM_EXPERIMENT_Radiation_DresInSpaceLow = Der Geigerzähler hat große Mengen Strahlung erkannt, die von Dres ausgeht.
		#KERBALISM_EXPERIMENT_Radiation_JoolInSpaceLow = Das KSC hat geraten, dass Sie nicht zurückkehren dürfen, aus Angst, den Rest der Kerbals zu kontaminieren
		#KERBALISM_EXPERIMENT_Radiation_LaytheInSpaceLow = Während Sie auf den wunderschönen Ozean unter Ihnen blicken, vergessen Sie, dass Sie langsam an Strahlenvergiftung sterben.
		#KERBALISM_EXPERIMENT_Radiation_VallInSpaceLow = Erstaunlicherweise liegen die Strahlungswerte auf einem vernünftigen Niveau.
		#KERBALISM_EXPERIMENT_Radiation_TyloInSpaceLow = Tylos subtile Magnetosphäre wirkt wie ein Generator und verstärkt Jools bereits intensives Strahlungsfeld.
		#KERBALISM_EXPERIMENT_Radiation_BopInSpaceLow = Bop weist eine ungewöhnlich hohe Strahlung auf, die anscheinend bei 68 Grad nördlicher Breite und 114 Grad östlicher Länge konzentriert ist. Seltsam
		#KERBALISM_EXPERIMENT_Radiation_PolInSpaceLow = Der Raum um Pol ist voller radioaktiver Ionen, die vom Magnetfeld Jools leider eingefangen wurden.
		#KERBALISM_EXPERIMENT_Radiation_EelooInSpaceLow = F&E ist begierig zu untersuchen, welche Auswirkungen die große Menge interstellarer Strahlung auf Eeloos Oberfläche hatte.
		#KERBALISM_EXPERIMENT_Radiation_SunInSpaceHigh = Das KSC teilt Ihnen mit, dass sie die Abschirmung *möglicherweise* vergessen haben.
		#KERBALISM_EXPERIMENT_Radiation_MohoInSpaceHigh = Die Strahlung von der Sonne hat im Verlauf Ihrer Reise dramatisch zugenommen.
		#KERBALISM_EXPERIMENT_Radiation_EveInSpaceHigh = Sie freuen sich nicht darauf, durch Eves Strahlungsgürtel zu reisen.
		#KERBALISM_EXPERIMENT_Radiation_GillyInSpaceHigh = Sie weigern sich, die Strahlungswerte zu prüfen, bis das KSC mit den Kartoffel-Wortspielen aufhört.
		#KERBALISM_EXPERIMENT_Radiation_KerbinInSpaceHigh = Dieser Ort ist gefährlich.
		#KERBALISM_EXPERIMENT_Radiation_MunInSpaceHigh = Sie haben Kerbins Strahlungsgürtel durchquert und sind nicht gestorben. Sie befürchten, dass das eine Menge verrückter Verschwörungstheorien auslösen wird.
		#KERBALISM_EXPERIMENT_Radiation_MinmusInSpaceHigh = Sie messen eine ungewöhnlich hohe Strahlung, können aber die Quelle nicht ermitteln.
		#KERBALISM_EXPERIMENT_Radiation_DunaInSpaceHigh = Duna scheint keine Magnetosphäre zu haben, daher wird kosmische Strahlung ein Problem für künftige Duna-Missionen sein.
		#KERBALISM_EXPERIMENT_Radiation_IkeInSpaceHigh = Unerwarteterweise scheint Ike magnetisch genug zu sein, um die von Dunas Atmosphäre abgetrennten Ionen zu stören.
		#KERBALISM_EXPERIMENT_Radiation_DresInSpaceHigh = Im Asteroiden kann niemand Ihr Facepalm hören, wenn Sie merken, dass Sie den Geigerzähler vergessen haben.
		#KERBALISM_EXPERIMENT_Radiation_JoolInSpaceHigh = Die von Jool ausgehende Strahlung ist in atemberaubendem Ausmaß, und Sie wünschen sich, auf der Duna-Erkundungsmission zu sein.
		#KERBALISM_EXPERIMENT_Radiation_LaytheInSpaceHigh = Laythe leistet unglaublicherweise großen Widerstand gegen den Ansturm von Jools Strahlungsgürtel. Möge Laythe Gnade finden. Möge Laythe Gnade finden.
		#KERBALISM_EXPERIMENT_Radiation_VallInSpaceHigh = Obwohl Vall nicht im Hauptstrahlungsgürtel liegt, wird er dennoch brutal von Jools Strahlung gezeichnet.
		#KERBALISM_EXPERIMENT_Radiation_TyloInSpaceHigh = Die Strahlung von Jool bildet einen intensiven Gürtel um Tylo, aber glücklicherweise scheint nicht viel die Oberfläche zu erreichen. Aber „viel“ ist ein relativer Begriff.
		#KERBALISM_EXPERIMENT_Radiation_BopInSpaceHigh = Bop scheint tatsächlich eine Quelle intensiver Strahlung zu sein, aber inmitten von Jools Strahlungsfeld wirkt es nicht signifikant.
		#KERBALISM_EXPERIMENT_Radiation_PolInSpaceHigh = Pol ist weit genug von Jool entfernt, um ionisierte Isotope aus Jools Magnetosphäre und interplanetarem Gas zu empfangen.
		#KERBALISM_EXPERIMENT_Radiation_EelooInSpaceHigh = Während Kerbols Einfluss schwächer wird, wird interstellare Strahlung deutlich ausgeprägter. Die Geheimnisse der Galaxie liegen offen vor Ihnen.

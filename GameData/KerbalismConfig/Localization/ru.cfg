		#kerbalism-container-inline-0625_Part_title = Контейнер припасов, 0,625м

		// ********** Part: kerbalism-container-inline-125
		#kerbalism-container-inline-125_Part_description = Одному из парней из JPL пришла в голову простая и блестящая идея: контейнеры большего размера для хранения большего количества припасов. После пары тысяч человеко-месяцев и 300 миллионов долларов финансирования прототип был готов к раннему тестированию.
		#kerbalism-container-inline-125_Part_manufacturer = Транспортные решения Tygoo
		#kerbalism-container-inline-125_Part_title = Контейнер припасов, 1,25м

		// ********** Part: kerbalism-container-inline-250
		#kerbalism-container-inline-250_Part_description = После экстравагантных излишеств предыдущего поколения контейнеров для снабжения космического класса финансовый департамент был не очень доволен финансированием разработки еще более крупного контейнера. Когда один из клерков пожаловался на обоснование "отправки людей в космос ради этого", JPL переключилось в режим войны и шантажом заставило всех вовлеченных бюрократов подчиниться. И проект был одобрен всерьез.
		#kerbalism-container-inline-250_Part_manufacturer = Транспортные решения Tygoo
		#kerbalism-container-inline-250_Part_title = Контейнер припасов, 2,5м

		// ********** Part: kerbalism-container-inline-375

// ============================================================================
// DynamicRadiation.cfg
// KerbalismBridge integration support merged into KerbalismConfig.
// ============================================================================


// ============================================================================
// KerbalismBridge integration: Settings.cfg
// ============================================================================
KERBALISM_DYNAMIC_RADIATION_SETTINGS
{
	// Minimum radiation while idle, as percent of peak (MM / Kerbalism Emitter config).
	Reactor_MinEmissionPercent = 25
	// E-folding time (seconds) for decay after shutdown (loaded / unloaded).
	Reactor_EmissionDecayRate = 3600

	Engine_MinEmissionPercent = 25
	Engine_EmissionDecayRate = 360
}


// ============================================================================
// KerbalismBridge integration: SystemHeatFissionReactors.cfg
// ============================================================================
// Dynamic radiation for fission reactors
@PART[*]:HAS[@MODULE[SystemHeatFissionReactorKerbalismUpdater]]:NEEDS[Kerbalism,FeatureRadiation]:FOR[zzzzzzz_KerbalismDynamicRadiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ModuleSystemHeatFissionReactor
		powerModuleId = #$/MODULE[SystemHeatFissionReactorKerbalismUpdater]/reactorModuleID$
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_EmissionDecayRate$
	}
}


// ============================================================================
// KerbalismBridge integration: SystemHeatFissionEngines.cfg
// ============================================================================
// Dynamic radiation for EC fission engines
@PART[*]:HAS[@MODULE[SystemHeatFissionEngineKerbalismUpdater]]:NEEDS[Kerbalism,FeatureRadiation]:FOR[zzzzzzz_KerbalismDynamicRadiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ModuleSystemHeatFissionEngine
		powerModuleId = #$/MODULE[SystemHeatFissionEngineKerbalismUpdater]/engineModuleID$
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_EmissionDecayRate$
	}
}

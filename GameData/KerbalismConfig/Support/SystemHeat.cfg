// Drill -> HarvesterSystemHeat
@PART[*]:HAS[@MODULE[Harvester],@MODULE[Configure]:HAS[#title[Drill]]]:NEEDS[Kerbalism,SystemHeat]:FINAL
{
    // remove legacy bridge modules if present
    !MODULE[SystemHeatHarvesterKerbalism],* {}
    !MODULE[ModuleSystemHeatAsteroidHarvester],* {}
    !MODULE[ModuleSystemHeatCometHarvester],* {}
    !MODULE[ModuleCometDrill],* {}
    !MODULE[ModuleAsteroidDrill],* {}

    @MODULE[Harvester],*
    {
		// swap to our heat-aware harvester
        @name = HarvesterSystemHeat

        // wire to this part's SystemHeat loop
        %systemHeatModuleID = harvester

        // core SystemHeat params
        %shutdownTemperature = 750
        %systemOutletTemperature = 350

        // set base heat power equal to ec_rate * 50, drills produce alot of heat!
        %systemPower = #$ec_rate$
		@systemPower *= 10

        // default behavior flags; Kerbalism handles resources, we handle heat
        %AutoShutdown = true
        %GeneratesHeat = false

        // define/replace the thermal efficiency curve
        !systemEfficiency {}
        systemEfficiency
		{
			key = 0 1.0
			key = 400 1.0
			key = 650 0.0
		}
    }

    @MODULE[Reliability]:HAS[#type[Harvester],#title[#KERBALISM_Reliability_title_Harvester]]
    {
        @type = HarvesterSystemHeat
    }
}


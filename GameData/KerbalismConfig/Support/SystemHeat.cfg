// ============================================================================
// SystemHeat.cfg
// KerbalismBridge integration support merged into KerbalismConfig.
// ============================================================================


// ============================================================================
// SystemHeat integration settings
// ============================================================================
KERBALISM_BRIDGE_SETTINGS
{
	// Simulate SystemHeat loop temperatures for unloaded vessels
	BackgroundThermalSim = true
	// Scales simplified radiator rejection in background thermal sim
	BackgroundRadiatorCoefficient = 0.05
}


// ============================================================================
// KerbalismBridge integration: SystemHeatFissionReactors.cfg
// ============================================================================
// Some third-party SystemHeat patches omit moduleID. Kerbalism sidecars need a
// stable ID so Harmony can fully take over loaded and background resource flow.
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionReactor]:HAS[!#moduleID[*]]]:NEEDS[Kerbalism,SystemHeatFissionReactors]:BEFORE[zzzzzz_KerbalismNative]
{
	@MODULE[ModuleSystemHeatFissionReactor]:HAS[!#moduleID[*]]
	{
		%moduleID = reactor
	}
}

// Legacy scalar HeatGeneration -> FloatCurve (old SystemHeat patches)
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionReactor]:HAS[#HeatGeneration[*],!HeatGeneration]]:NEEDS[Kerbalism,SystemHeatFissionReactors]:BEFORE[zzzzzz_KerbalismNative]
{
	@MODULE[ModuleSystemHeatFissionReactor]:HAS[#HeatGeneration[*],!HeatGeneration]
	{
		%KSH_HeatGeneration = #$HeatGeneration$
	}
}
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionReactor]:HAS[#KSH_HeatGeneration[*],!HeatGeneration]]:NEEDS[Kerbalism,SystemHeatFissionReactors]:BEFORE[zzzzzz_KerbalismNative]
{
	@MODULE[ModuleSystemHeatFissionReactor]:HAS[#KSH_HeatGeneration[*],!HeatGeneration]
	{
		!HeatGeneration = DELETE
		HeatGeneration
		{
			key = 0 0 0 0
			key = #100 $../KSH_HeatGeneration$ 0 0
		}
	}
}
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionReactor]:HAS[#KSH_HeatGeneration[*]]]:NEEDS[Kerbalism,SystemHeatFissionReactors]:BEFORE[zzzzzz_KerbalismNative]
{
	@MODULE[ModuleSystemHeatFissionReactor]:HAS[#KSH_HeatGeneration[*]]
	{
		!KSH_HeatGeneration = DELETE
	}
}

// Fission reactor KerbalismUpdater + planner (exclude NFE and KPBS ProcessControllerSystemHeat paths)
@PART[!nfe-reactor-*,!KKAOSS_Nuclear_Reactor]:HAS[@MODULE[ModuleSystemHeatFissionReactor]:HAS[#moduleID[*]],!MODULE[ProcessControllerSystemHeat]]:NEEDS[Kerbalism,SystemHeatFissionReactors]:FOR[zzzzzz_KerbalismNative]
{
	MODULE
	{
		name = SystemHeatFissionReactorKerbalismUpdater
		reactorModuleID = #$/MODULE[ModuleSystemHeatFissionReactor]:HAS[#moduleID[*]],0/moduleID$
	}

	!MODULE[ProcessController],* {}
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		title = #KERBALISM_Brokers_FissionReactor
		considered = true
	}

	@MODULE[Reliability]:HAS[#title[Fission?Reactor]]
	{
		@type = ModuleSystemHeatFissionReactor
	}
}

// Add Reliability to fission reactors
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionReactor],!MODULE[Reliability]]:NEEDS[FeatureReliability,SystemHeatFissionReactors]:FOR[zzzzzz_KerbalismNative]
{
	MODULE
	{
		name = Reliability
		type = ModuleSystemHeatFissionReactor
		title = #KERBALISM_BranchLoc_Fission_Reactor
		redundancy = Power Generation
		repair = Engineer
		mtbf = 36288000
		extra_cost = 2.5
		extra_mass = 1.0
	}
}


// ============================================================================
// KerbalismBridge integration: SystemHeatFissionEngines.cfg
// ============================================================================
// Some third-party SystemHeat patches omit moduleID. Without it, fission engines
// keep their native resource producer and can trip Kerbalism coherency checks.
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[!#moduleID[*]]]:NEEDS[Kerbalism,SystemHeatFissionEngines]:BEFORE[zzzzzz_KerbalismNative]
{
	@MODULE[ModuleSystemHeatFissionEngine]:HAS[!#moduleID[*]]
	{
		%moduleID = engine
	}
}

// Legacy scalar HeatGeneration -> FloatCurve (old SystemHeat patches)
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#HeatGeneration[*],!HeatGeneration]]:NEEDS[Kerbalism,SystemHeatFissionEngines]:BEFORE[zzzzzz_KerbalismNative]
{
	@MODULE[ModuleSystemHeatFissionEngine]:HAS[#HeatGeneration[*],!HeatGeneration]
	{
		%KSH_HeatGeneration = #$HeatGeneration$
	}
}
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#KSH_HeatGeneration[*],!HeatGeneration]]:NEEDS[Kerbalism,SystemHeatFissionEngines]:BEFORE[zzzzzz_KerbalismNative]
{
	@MODULE[ModuleSystemHeatFissionEngine]:HAS[#KSH_HeatGeneration[*],!HeatGeneration]
	{
		!HeatGeneration = DELETE
		HeatGeneration
		{
			key = 0 0 0 0
			key = #2 $../KSH_HeatGeneration$ 0 0
			key = #100 $../KSH_HeatGeneration$ 0 0
		}
	}
}
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#KSH_HeatGeneration[*]]]:NEEDS[Kerbalism,SystemHeatFissionEngines]:BEFORE[zzzzzz_KerbalismNative]
{
	@MODULE[ModuleSystemHeatFissionEngine]:HAS[#KSH_HeatGeneration[*]]
	{
		!KSH_HeatGeneration = DELETE
	}
}

// Fission engine KerbalismUpdater (EC and non-EC paths)
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#moduleID[*]],!MODULE[SystemHeatFissionEngineKerbalismUpdater]]:NEEDS[Kerbalism,SystemHeatFissionEngines]:FOR[zzzzzz_KerbalismNative]
{
	MODULE
	{
		name = SystemHeatFissionEngineKerbalismUpdater
		engineModuleID = #$/MODULE[ModuleSystemHeatFissionEngine]:HAS[#moduleID[*]],0/moduleID$
	}

	!MODULE[ProcessController],* {}
}

// Planner on EC-capable fission engines only
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#moduleID[*],@ElectricalGeneration,!#GeneratesElectricity[*alse]],@MODULE[SystemHeatFissionEngineKerbalismUpdater]]:NEEDS[Kerbalism,SystemHeatFissionEngines]:FOR[zzzzzz_KerbalismNative]
{
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		title = #KERBALISM_Brokers_FissionEngine
		considered = false
	}
}
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#moduleID[*],#GeneratesElectricity[*alse]]]:NEEDS[Kerbalism,SystemHeatFissionEngines]:FOR[zzzzzz_KerbalismNative]
{
	@MODULE[SystemHeatFissionEngineKerbalismUpdater]
	{
		%GeneratesElectricity = false
		%MaxECGeneration = 0
	}
	!MODULE[PlannerController]:HAS[#title[#KERBALISM_Brokers_FissionEngine]] {}
}


// ============================================================================
// KerbalismBridge integration: NativeModuleKerbalismUpdaters.cfg
// ============================================================================
// Native SystemHeat converters/harvesters -> KerbalismUpdater sidecars

// Converters (non-Chemical Plant)
@PART[*]:HAS[@MODULE[ModuleSystemHeatConverter]:HAS[#moduleID[*]],!MODULE[ProcessControllerSystemHeat],!MODULE[Configure]:HAS[#title[Chemical?Plant]],!MODULE[SystemHeatConverterKerbalismUpdater]]:NEEDS[Kerbalism,SystemHeat]:FOR[zzzzzz_KerbalismNative]
{
	MODULE
	{
		name = SystemHeatConverterKerbalismUpdater
		converterModuleID = #$../MODULE[ModuleSystemHeatConverter]:HAS[#moduleID[*]],0/moduleID$
	}

	MODULE
	{
		name = PlannerController
		title = #KERBALISM_Brokers_Converter
		considered = true
	}
}

// Harvesters (non-Kerbalism Drill path)
@PART[*]:HAS[@MODULE[ModuleSystemHeatHarvester]:HAS[#moduleID[*]],!MODULE[HarvesterSystemHeat],!MODULE[Configure]:HAS[#title[Drill]],!MODULE[SystemHeatHarvesterKerbalismUpdater]]:NEEDS[Kerbalism,SystemHeat]:FOR[zzzzzz_KerbalismNative]
{
	MODULE
	{
		name = SystemHeatHarvesterKerbalismUpdater
		harvesterModuleID = #$../MODULE[ModuleSystemHeatHarvester]:HAS[#moduleID[*]],0/moduleID$
	}

	MODULE
	{
		name = PlannerController
		title = #KERBALISM_Brokers_Harvester
		considered = true
	}
}


// ============================================================================
// KerbalismBridge integration: SystemHeatRadiators.cfg
// ============================================================================
// SystemHeat radiators keep their native module for actual loop rejection.
// Kerbalism sidecar only takes over resource accounting/background/planner handling.
@PART[*]:HAS[@MODULE[ModuleSystemHeatRadiator],!MODULE[SystemHeatRadiatorKerbalism]]:NEEDS[Kerbalism,SystemHeat]:FOR[zzzzzz_KerbalismProcess]
{
	MODULE
	{
		name = SystemHeatRadiatorKerbalism
		radiatorModuleName = ModuleSystemHeatRadiator
	}
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		title = #KERBALISM_Brokers_Radiator
		considered = true
	}
}

// Stock radiators without SystemHeat native sidecar support.
@PART[!heat-exchanger-125-1,!heat-exchanger-25-1]:HAS[@MODULE[ModuleActiveRadiator],!MODULE[ModuleSystemHeatRadiator],!MODULE[SystemHeatRadiatorKerbalism]]:NEEDS[Kerbalism,SystemHeat]:FOR[zzzzzz_KerbalismProcess]
{
	MODULE
	{
		name = SystemHeatRadiatorKerbalism
		radiatorModuleName = ModuleActiveRadiator
	}
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		title = #KERBALISM_Brokers_Radiator
		considered = true
	}
}

@PART[*]:HAS[@MODULE[SystemHeatRadiatorKerbalism],!MODULE[ModuleActiveRadiator],@MODULE[Reliability]:HAS[#type[ModuleActiveRadiator]]]:NEEDS[FeatureReliability,SystemHeat]:FOR[zzzzzz_KerbalismProcess]
{
	@MODULE[Reliability]:HAS[#type[ModuleActiveRadiator]]
	{
		@type = SystemHeatRadiatorKerbalism
	}
}
@PART[*]:HAS[@MODULE[SystemHeatRadiatorKerbalism],!MODULE[ModuleSystemHeatRadiator],@MODULE[Reliability]:HAS[#type[ModuleSystemHeatRadiator]]]:NEEDS[FeatureReliability,SystemHeat]:FOR[zzzzzz_KerbalismProcess]
{
	@MODULE[Reliability]:HAS[#type[ModuleSystemHeatRadiator]]
	{
		@type = SystemHeatRadiatorKerbalism
	}
}

// Heat animation
@PART[*]:HAS[@MODULE[SystemHeatRadiatorKerbalism],@MODULE[ModuleAnimateHeat],!MODULE[ModuleSystemHeatColorAnimator]]:NEEDS[Kerbalism,SystemHeat]:FOR[zzzzzz_KerbalismProcess]
{
	!MODULE[ModuleAnimateHeat] {}
	MODULE
	{
		name = ModuleSystemHeatColorAnimator
		moduleID = heat
		useRate = false
		animRate = 1
		shaderProperty = _EmissiveColor
		toggleInEditor = false
		toggleInFlight = false
		redCurve
		{
			key = 0 1
			key = 1 1
		}
		greenCurve
		{
			key = 0 1
			key = 1 1
		}
		blueCurve
		{
			key = 0 1
			key = 1 1
		}
		alphaCurve
		{
			key = 0 0
			key = 1 1
		}
	}
}

// Clean-up
@PART[*]:HAS[@MODULE[SystemHeatRadiatorKerbalism]]:NEEDS[Kerbalism,SystemHeat]:AFTER[zzzzzz_KerbalismProcess]
{
	@MODULE[SystemHeatRadiatorKerbalism],*
	{
		!KSH_HeatEmission = DELETE
	}
}



// Nested Reliability fix (AirlineKuisine)
@PART[dsak_proc_3c,dsak_proc_c]:NEEDS[Kerbalism,SystemHeat,AirlineKuisine,FeatureReliability]:FINAL
{
    // Create/update a root-level Reliability using values from the nested one
    %MODULE[Reliability]
    {
        %type        = #$../MODULE[Configure]/MODULE[Reliability]/type$
        %title       = #$../MODULE[Configure]/MODULE[Reliability]/title$
        %repair      = #$../MODULE[Configure]/MODULE[Reliability]/repair$
        %mtbf        = #$../MODULE[Configure]/MODULE[Reliability]/mtbf$
        %extra_cost  = #$../MODULE[Configure]/MODULE[Reliability]/extra_cost$
        %extra_mass  = #$../MODULE[Configure]/MODULE[Reliability]/extra_mass$
    }

    // Remove the nested Reliability from Configure
    @MODULE[Configure]
    {
        !MODULE[Reliability],* {}
    }
}

@PART[*]:HAS[@MODULE[Configure]:HAS[#title[Chemical?Plant]]]:NEEDS[Kerbalism,SystemHeat]:FINAL
{
    // Clean out any legacy bridge modules to prevent duplicates
    !MODULE[SystemHeatConverterKerbalism],* {}

    // Clean up any stray Reliability modules with ModuleResourceConverter
    !MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}

    // Convert every ProcessController on the part
    @MODULE[ProcessController]:HAS[#capacity[*]],*
    {
        // swap to our heat-aware controller
        @name = ProcessControllerSystemHeat

        // wire to this part's SystemHeat loop
        %systemHeatModuleID = isru

        // core SystemHeat params
        %shutdownTemperature = 800
        %systemOutletTemperature = 600

        // set base heat power equal to the Kerbalism process capacity
        %systemPower = #$capacity$

        // default behavior flags; Kerbalism handles resources, we handle heat
        %AutoShutdown = true
        %GeneratesHeat = false

        // define/replace the thermal efficiency curve
        !systemEfficiency {}
        systemEfficiency
        {
            key = 0    0.0
            key = 300  1.0
            key = 1000 1.0
            key = 1300 0.0
        }
    }

    @MODULE[Reliability]:HAS[#type[ProcessController],#title[Chemical?Plant]]
    {
        @type = ProcessControllerSystemHeat
    }
}


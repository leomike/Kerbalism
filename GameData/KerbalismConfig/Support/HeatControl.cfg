// ============================================================================
// KerbalismBridge integration: HeatControl.cfg
// ============================================================================
// Heat Control radiators; EBR exchangers -> ModuleSystemHeatSink
@PART[heat-exchanger-125-1]:NEEDS[HeatControl,SystemHeat,Kerbalism]:FOR[zzzzzz_KerbalismHeatControl]
{
	@title = #KERBALISM_HC_heatBuffer125_title
	@description = #KERBALISM_HC_heatBuffer125_desc

	!MODULE[ModuleActiveRadiator],* {}
	!MODULE[ModuleSystemHeatRadiator],* {}
	!MODULE[SystemHeatRadiatorKerbalism],* {}
	!MODULE[PlannerController],* {}
	!MODULE[Reliability]:HAS[#type[ModuleActiveRadiator]] {}
	!MODULE[Reliability]:HAS[#type[SystemHeatRadiatorKerbalism]] {}
	!MODULE[ModuleSystemHeat],* {}
	!MODULE[ModuleSystemHeatSink],* {}

	MODULE
	{
		name = ModuleSystemHeat
		volume = 2
		moduleID = buffer
		iconName = Icon_Snow
	}

	MODULE
	{
		name = ModuleSystemHeatSink
		moduleID = buffer
		systemHeatModuleID = buffer
		// maxEnergyTransfer 12500 W -> 12.5 kW ingest rate
		maxHeatRate = 12.5
		heatStorageDumpRate = 12.5
		heatStorageMaximum = 31500
		heatStorageMass = 200
		heatStorageSpecificHeat = 1.26
	}
}

@PART[heat-exchanger-25-1]:NEEDS[HeatControl,SystemHeat,Kerbalism]:FOR[zzzzzz_KerbalismHeatControl]
{
	@title = #KERBALISM_HC_heatBuffer25_title
	@description = #KERBALISM_HC_heatBuffer25_desc

	!MODULE[ModuleActiveRadiator],* {}
	!MODULE[ModuleSystemHeatRadiator],* {}
	!MODULE[SystemHeatRadiatorKerbalism],* {}
	!MODULE[PlannerController],* {}
	!MODULE[Reliability]:HAS[#type[ModuleActiveRadiator]] {}
	!MODULE[Reliability]:HAS[#type[SystemHeatRadiatorKerbalism]] {}
	!MODULE[ModuleSystemHeat],* {}
	!MODULE[ModuleSystemHeatSink],* {}

	MODULE
	{
		name = ModuleSystemHeat
		volume = 8
		moduleID = buffer
		iconName = Icon_Snow
	}

	MODULE
	{
		name = ModuleSystemHeatSink
		moduleID = buffer
		systemHeatModuleID = buffer
		// maxEnergyTransfer 50000 W -> 50 kW ingest rate
		maxHeatRate = 50
		heatStorageDumpRate = 50
		heatStorageMaximum = 126000
		heatStorageMass = 750
		heatStorageSpecificHeat = 1.26
	}
}

@PART[heat-exchanger-125-1]:HAS[@MODULE[ModuleSystemHeatSink],!MODULE[Reliability]:HAS[#type[ModuleSystemHeatSink]]]:NEEDS[HeatControl,SystemHeat,Kerbalism,FeatureReliability]:FOR[zzzzzz_KerbalismHeatControl]
{
	MODULE
	{
		name = Reliability
		type = ModuleSystemHeatSink
		title = #KERBALISM_HC_heatBuffer_title
		redundancy = Heat Storage
		repair = Engineer
		mtbf = 72576000
		extra_cost = 1.0
		extra_mass = 0.25
	}
}

@PART[heat-exchanger-25-1]:HAS[@MODULE[ModuleSystemHeatSink],!MODULE[Reliability]:HAS[#type[ModuleSystemHeatSink]]]:NEEDS[HeatControl,SystemHeat,Kerbalism,FeatureReliability]:FOR[zzzzzz_KerbalismHeatControl]

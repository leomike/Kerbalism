// SpaceDust harvesters -> Layer B
@PART[*]:HAS[@MODULE[ModuleSpaceDustHarvester]:HAS[#ModuleID[*]],!MODULE[SpaceDustHarvesterKerbalismUpdater]]:NEEDS[Kerbalism,SystemHeat,SpaceDust]:FOR[zzzzzz_KerbalismSpaceDust]
{
	MODULE
	{
		name = SpaceDustHarvesterKerbalismUpdater
		harvesterModuleID = #$../MODULE[ModuleSpaceDustHarvester]:HAS[#ModuleID[*]],0/ModuleID$
	}

	!MODULE[PlannerController],* {}
}

@PART[spacedust-atmosphere-processor-125-1|spacedust-atmosphere-processor-25-1]:NEEDS[Kerbalism]:FINAL
{
	!MODULE[PlannerController],* {}
}

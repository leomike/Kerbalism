// ============================================================================
// Kerbalism support: Buffalo S.A.F.E.R. (WBI_SAFER)
// Layer A: ProcessController (_Nukereactor). Layer B: ProcessControllerSystemHeat + SystemHeat loop.
// ============================================================================

// Profile + pseudo-resource when neither USI ReactorPack nor NFE already registered _Nukereactor
Profile:NEEDS[WildBlueIndustries,ProfileDefault,!UmbraSpaceIndustries,!NearFutureElectrical]
{
	name = KerbalismSupport
	modname = Buffalo
	moddir = Buffalo

	Supply
	{
		resource = EnrichedUranium
		low_message = #KERBALISM_BranchLoc_Enriched_Uranium_is_almost_depleted_on_VESSEL
		empty_message = #KERBALISM_BranchLoc_There_is_no_more_Enriched_Uranium_on_VESSEL
		refill_message = #KERBALISM_BranchLoc_Enriched_Uranium_storage_refilled_on_VESSEL
	}

	Process
	{
		name = fission reactor
		title = #KERBALISM_NFE_FissionReactor_title
		modifier = _Nukereactor
		input = EnrichedUranium@0.000000046875
		output = DepletedFuel@0.000000046875
		output = ElectricCharge@10
		dump_valve = ElectricCharge,DepletedFuel,ElectricCharge&DepletedFuel
	}
}

RESOURCE_DEFINITION:NEEDS[WildBlueIndustries,ProfileDefault,!UmbraSpaceIndustries,!NearFutureElectrical]
{
	name = _Nukereactor
	density = 0.0
	isVisible = false
}

@PART[WBI_SAFER]:NEEDS[WildBlueIndustries,ProfileDefault]:AFTER[KerbalismDefault]
{
	!MODULE[ModuleOverheatDisplay] {}
	!MODULE[ModuleCoreHeat] {}
	!MODULE[ModuleCoreHeatNoCatchup] {}
	!MODULE[ModuleResourceConverter] {}
	!MODULE[PlannerController],* {}
	!MODULE[Reliability],* {}

	@RESOURCE[DepletedUranium]
	{
		@name = DepletedFuel
	}

	MODULE
	{
		name = ProcessController
		resource = _Nukereactor
		title = #KERBALISM_NFE_FissionReactor_title
		capacity = 12.5
		valve_i = 1
	}

	MODULE:NEEDS[FeatureReliability]
	{
		name = Reliability
		type = ProcessController
		title = #KERBALISM_BranchLoc_Fission_Reactor
		redundancy = Power Generation
		repair = Engineer
		mtbf = 36288000
		extra_cost = 2.5
		extra_mass = 1.0
	}
}

@PART[WBI_SAFER]:NEEDS[WildBlueIndustries,ProfileDefault,FeatureRadiation]:AFTER[KerbalismDefault]
{
	MODULE
	{
		name = Emitter
		radiation = 0.0000277775 // 0.1 rad/h
	}
}

// ============================================================================
// KerbalismBridge integration: Buffalo S.A.F.E.R. SystemHeat (NFE-style path)
// ============================================================================
@PART[WBI_SAFER]:NEEDS[WildBlueIndustries,Kerbalism,ProfileDefault]:BEFORE[zzzzzz_KerbalismNative]
{
	!MODULE[SystemHeatFissionReactorKerbalismUpdater],* {}
}

@PART[WBI_SAFER]:HAS[@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Nukereactor]],!MODULE[ModuleSystemHeat]]:NEEDS[Kerbalism,SystemHeat,WildBlueIndustries]:AFTER[zzzzzz_KerbalismNative]
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = 0.512
		moduleID = reactor
		iconName = Icon_Nuclear
	}
}

@PART[WBI_SAFER]:HAS[@MODULE[ProcessController]:HAS[#resource[_Nukereactor]]]:NEEDS[Kerbalism,SystemHeat,WildBlueIndustries,ProfileDefault]:BEFORE[zzzzzz_KerbalismNative]
{
	!MODULE[ModuleSystemHeatFissionReactor],* {}
	!MODULE[ModuleSystemHeatFissionFuelContainer],* {}

	@MODULE[ModuleActiveRadiator]
	{
		@name = ModuleSystemHeatRadiator
		moduleID = radiator
		systemHeatModuleID = reactor
		scalarModuleID = heat
		maxTempAnimation = 1200
		isCoreRadiator = true
		maxEnergyTransfer = 500
		overcoolFactor = 0.25
		temperatureCurve
		{
			key = 0 0
			key = 1000 500
		}
		convectiveArea = 0.5
	}

	@MODULE[ProcessController]:HAS[#resource[_Nukereactor]]
	{
		@name = ProcessControllerSystemHeat
		%valve_i = 1
		%systemHeatModuleID = reactor
		%systemOutletTemperature = 1000
		%systemPower = 500
		%CurrentPowerPercent = 100
		%MinimumThrottle = 25
		%meltdownTemperature = 1300
		%MaximumTemperature = 2000
		%CoreDamageRate = 0.008
		%CurrentSafetyOverride = 1000
		%allowManualShutdownTemperatureControl = true
		%AutoShutdown = true
		!coreDamageCurve {}
		coreDamageCurve
		{
			key = 1300 0.25
			key = 1650 0.75
			key = 2000 1.0
		}
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0     0.0
			key = 1000  1.0
			key = 1300  0.0
		}
	}

	@MODULE[Reliability]:HAS[#type[ProcessController]]
	{
		@type = ProcessControllerSystemHeat
		@mtbf = 170000000
	}

	!MODULE[PlannerController],* {}
}

@PART[WBI_SAFER]:NEEDS[Kerbalism,SystemHeat,WildBlueIndustries]:FINAL
{
	@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Nukereactor]]
	{
		@capacity = 12.5
		%MinimumThrottle = 25
		%systemOutletTemperature = 1000
		%systemPower = 500
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0     0.0
			key = 1000  1.0
			key = 1300  0.0
		}
	}

	@MODULE[Reliability]:HAS[#type[ProcessControllerSystemHeat]]
	{
		@mtbf = 170000000
	}
}

// ============================================================================
// KerbalismBridge integration: NFE_FissionReactor_ProcessControllerSystemHeat.cfg
// ============================================================================
// NFE nfe-reactor-* -> ProcessControllerSystemHeat

@PART[nfe-reactor-*]:NEEDS[NearFutureElectrical,Kerbalism,ProfileDefault]:BEFORE[zzzzzz_KerbalismNative]
{
	!MODULE[SystemHeatFissionReactorKerbalismUpdater],* {}
}

@PART[nfe-reactor-*]:HAS[@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Nukereactor]],!MODULE[ModuleSystemHeat]]:NEEDS[Kerbalism,SystemHeat,NearFutureElectrical]:AFTER[zzzzzz_KerbalismNative]
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = 1.0
		moduleID = reactor
		iconName = Icon_Nuclear
	}
}

@PART[nfe-reactor-*]:HAS[@MODULE[ProcessController]:HAS[#resource[_Nukereactor]]]:NEEDS[Kerbalism,SystemHeat,NearFutureElectrical,ProfileDefault]:BEFORE[zzzzzz_KerbalismNative]
{
	!MODULE[ModuleSystemHeatFissionReactor],* {}

	@MODULE[ProcessController]:HAS[#resource[_Nukereactor]]
	{
		@name = ProcessControllerSystemHeat
		%valve_i = 1
		%systemHeatModuleID = reactor
		%systemOutletTemperature = 800
		%systemPower = 100
		%CurrentPowerPercent = 100
		%MinimumThrottle = 10
		// meltdownTemperature = critical damage onset (SystemHeat CriticalTemperature)
		%meltdownTemperature = 1300
		// MaximumTemperature = full core meltdown temperature
		%MaximumTemperature = 2000
		%CoreDamageRate = 0.008
		%CurrentSafetyOverride = 1000
		%allowManualShutdownTemperatureControl = true
		%AutoShutdown = true
		!coreDamageCurve {}
		coreDamageCurve
		{
			key = 1300 0.25
			key = 1650 0.75
			key = 2000 1.0
		}
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0    0.0
			key = 800  1.0
			key = 1300 0.0
		}
	}

	@MODULE[Reliability]:HAS[#type[ProcessController]]
	{
		@type = ProcessControllerSystemHeat
		// NFE configs do not define Reliability; this is derived from EnrichedUranium amount / INPUT_RESOURCE ratio (~25 Kerbin years).
		@mtbf = 230040000
	}

	!MODULE[PlannerController],* {}
}


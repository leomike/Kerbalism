// ============================================================================
// KerbalismBridge integration: SterlingSystems.cfg
// ============================================================================
// Sterling Systems -> ProcessControllerSystemHeat

@PART[strl-isru-circ-fif-*|strl-isru-circ-mmf-*|strl-isru-circ-gcc-*|strl-isru-circ-tif-*|strl-isru-circ-thd-*]:HAS[@MODULE[ProcessController]|@MODULE[ProcessControllerSystemHeat],!MODULE[ModuleSystemHeat]:HAS[#moduleID[isru]]]:NEEDS[Kerbalism,SystemHeat,SterlingSystems]:FOR[zzzzzz_KerbalismProcess]
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = #$/mass$
		moduleID = isru
		iconName = Icon_Gears
	}
}

@PART[strl-isru-circ-fif-*|strl-isru-circ-mmf-*|strl-isru-circ-gcc-*|strl-isru-circ-tif-*|strl-isru-circ-thd-*|strl-rctrms-*|strl-rctrpb-*|strl-rctrscm|strl-rctrkrusty|strl-tectrb-*|strl-preh-*]:HAS[@MODULE[ProcessController]:HAS[#capacity[*]]]:NEEDS[Kerbalism,SystemHeat,SterlingSystems]:FINAL
{
	!MODULE[ModuleSystemHeatConverter],* {}

	@MODULE[ProcessController]:HAS[#capacity[*]],*
	{
		@name = ProcessControllerSystemHeat
		%systemHeatModuleID = isru
		%shutdownTemperature = 800
		%systemOutletTemperature = 600
		%systemPower = #$capacity$
		%AutoShutdown = true
		%GeneratesHeat = false
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0    0.0
			key = 300  1.0
			key = 1000 1.0
			key = 1300 0.0
		}
	}

	@MODULE[Reliability]:HAS[#type[ProcessController]]
	{
		@type = ProcessControllerSystemHeat
	}

	@MODULE[Configure],*
	{
		@SETUP,*
		{
			@MODULE,*
			{
				@type = ProcessControllerSystemHeat
			}
		}
	}
}

// MSR uses nuke loop, not isru
@PART[strl-rctrms-*]:HAS[@MODULE[ProcessControllerSystemHeat]]:NEEDS[Kerbalism,SystemHeat,SterlingSystems]:FINAL
{
	@MODULE[ProcessControllerSystemHeat],*
	{
		@systemHeatModuleID = nuke
		%shutdownTemperature = 1300
		%systemOutletTemperature = 1100
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0 1
			key = 1 1
		}
	}
}

// Fission Foundry (capacity != EC heat)
@PART[strl-isru-circ-fif-*]:HAS[@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_FiF]]]:NEEDS[Kerbalism,SystemHeat,SterlingSystems]:FINAL
{
	@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_FiF]]
	{
		%systemPower = 60
		@systemPower *= #$/refPower$
		%shutdownTemperature = 1100
		%systemOutletTemperature = 650

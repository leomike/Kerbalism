// Sterling preheaters -> ProcessController + SystemHeat.

@PART[strl-preh-*]:NEEDS[CommunityResourcePack,Kerbalism,SystemHeat,SterlingSystems]{
	@tags ^= :$: _kerbalism

	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[ModuleResourceConverter],* {}
	!MODULE[SystemHeatConverterKerbalism],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}
	!MODULE[PlannerController],* {}
	!MODULE[ModuleOverheatDisplay] {}
	!MODULE[ModuleCoreHeat] {}

	MODULE
	{
		name = ProcessController
		resource = _Preheater
		title = #KERBALISM_BranchLoc_Heating
		capacity = #$/refPower$
	}
}

// B9 temperature subtypes override heat converter outlet/shutdown.
@PART[strl-preh-*]:HAS[@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Preheater]]]:NEEDS[CommunityResourcePack,Kerbalism,SystemHeat,SterlingSystems]:FINAL
{
	@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Preheater]]
	{
		%deployModuleType = Preheater
		%requireDeploy = true
	}
}

@PART[strl-preh-*]:HAS[@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Preheater]],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[shutdownTemperature]]]:NEEDS[CommunityResourcePack,B9PartSwitch,Kerbalism,SystemHeat,SterlingSystems]:FINAL
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[shutdownTemperature]]
	{
		@SUBTYPE,*
		{
			@MODULE,*
			{
				@IDENTIFIER[ModuleSystemHeatConverter]
				{
					@name = ProcessControllerSystemHeat
				}
			}
		}
	}
}

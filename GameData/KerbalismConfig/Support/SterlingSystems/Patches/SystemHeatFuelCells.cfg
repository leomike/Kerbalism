// MAEC fuel cells: discharge via ProcessController, recharge via ProcessControllerSystemHeat.

@PART[strl-fuelcell-*|strl-worldpower-fuelcell*]:NEEDS[CommunityResourcePack,Kerbalism,SystemHeat,SterlingSystems]{
	@tags ^= :$: _kerbalism

	maecAlRechargerHeat = 10800
	@maecAlRechargerHeat *= #$/refPower$
	maecSiRechargerHeat = 10125
	@maecSiRechargerHeat *= #$/refPower$
	maecBeRechargerHeat = 16200
	@maecBeRechargerHeat *= #$/refPower$

	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[ModuleResourceConverter],* {}
	!MODULE[SystemHeatConverterKerbalism],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}
	!MODULE[PlannerController],* {}
	!MODULE[ModuleOverheatDisplay] {}
	!MODULE[ModuleCoreHeat] {}
	!MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}
	!MODULE[ModuleSystemHeat]:HAS[#moduleID[isru]],* {}

	MODULE
	{
		name = ModuleSystemHeat
		volume = #$/refVolume$
		@volume *= 0.04
		moduleID = isru
		iconName = Icon_Gears
	}

	MODULE
	{
		name = ProcessControllerB9ResourceSync
	}

	MODULE
	{
		name = ProcessControllerSystemHeat
		processID = MAECFuelCell
		resource = _MAECAlFuelCell
		title = #autoLOC_502022 // Fuel Cell
		capacity = #$/refPower$
		systemPower = 0
		AutoShutdown = false
		GeneratesHeat = false
		deployModuleType = FuelCell
		requireDeploy = true
	}

	MODULE
	{
		name = ProcessControllerSystemHeat
		processID = MAECRecharger
		resource = _MAECAlRecharger
		title = #LOC_strl_converter_recharger
		capacity = #$/refPower$
		systemHeatModuleID = isru
		shutdownTemperature = 1300
		systemOutletTemperature = 1000
		systemPower = #$/maecAlRechargerHeat$
		AutoShutdown = false
		GeneratesHeat = false
		deployModuleType = FuelCell
		requireDeploy = true
		systemEfficiency
		{
			key = 0 0
			key = 700 0.1 0.0001 0.0025
			key = 1000 1
		}
	}

	MODULE:NEEDS[FeatureReliability]
	{
		name = Reliability
		type = ProcessControllerSystemHeat
		title = #KERBALISM_FuelCell_title
		redundancy = Power Generation
		repair = Engineer
		mtbf = 72576000
		extra_cost = 1.0
		extra_mass = 0.5
	}

	MODULE:NEEDS[FeatureReliability]
	{
		name = Reliability
		type = ProcessControllerSystemHeat
		title = #LOC_strl_converter_recharger
		repair = Engineer
		mtbf = 72576000
		extra_cost = 1.0
		extra_mass = 0.2
	}
}

@PART[strl-fuelcell-*|strl-worldpower-fuelcell*]:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]]:NEEDS[CommunityResourcePack,B9PartSwitch,Kerbalism,SystemHeat,SterlingSystems]:FINAL
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]
	{
		@SUBTYPE[Aluminium]
		{
			!MODULE:HAS[@IDENTIFIER[ModuleResourceConverter]],* {}
			!MODULE:HAS[@IDENTIFIER[ModuleSystemHeatConverter]],* {}
			MODULE
			{
				IDENTIFIER
				{
					name = ProcessControllerSystemHeat
					processID = MAECFuelCell
				}
				DATA
				{
					resource = _MAECAlFuelCell
					title = #autoLOC_502022
				}
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ProcessControllerSystemHeat
					processID = MAECRecharger
				}
				DATA
				{
					resource = _MAECAlRecharger
					title = #LOC_strl_converter_recharger
					systemPower = #$/maecAlRechargerHeat$
				}
			}
		}
		@SUBTYPE[Silicon]
		{
			!MODULE:HAS[@IDENTIFIER[ModuleResourceConverter]],* {}
			!MODULE:HAS[@IDENTIFIER[ModuleSystemHeatConverter]],* {}
			MODULE
			{
				IDENTIFIER
				{
					name = ProcessControllerSystemHeat
					processID = MAECFuelCell
				}
				DATA
				{
					resource = _MAECSiFuelCell
					title = #autoLOC_502022
				}
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ProcessControllerSystemHeat
					processID = MAECRecharger
				}
				DATA
				{
					resource = _MAECSiRecharger
					title = #LOC_strl_converter_recharger
					systemPower = #$/maecSiRechargerHeat$
				}
			}
		}
		@SUBTYPE[Beryllium]
		{
			!MODULE:HAS[@IDENTIFIER[ModuleResourceConverter]],* {}
			!MODULE:HAS[@IDENTIFIER[ModuleSystemHeatConverter]],* {}
			MODULE
			{
				IDENTIFIER
				{
					name = ProcessControllerSystemHeat
					processID = MAECFuelCell
				}
				DATA
				{
					resource = _MAECBeFuelCell
					title = #autoLOC_502022
				}
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ProcessControllerSystemHeat
					processID = MAECRecharger
				}
				DATA
				{
					resource = _MAECBeRecharger
					title = #LOC_strl_converter_recharger
					systemPower = #$/maecBeRechargerHeat$
				}
			}
		}
	}
}

@PART[strl-fuelcell-*|strl-worldpower-fuelcell*]:HAS[#maecAlRechargerHeat]:NEEDS[CommunityResourcePack,Kerbalism,SystemHeat,SterlingSystems]:FINAL
{
	!maecAlRechargerHeat = nope
	!maecSiRechargerHeat = nope
	!maecBeRechargerHeat = nope
}

// Thermals

// Legacy Bridge mode renamed SystemHeat radiator modules because the Bridge module
// inherited ModuleSystemHeatRadiator. The integrated reflection module is a sidecar,
// so these renames must stay disabled unless explicitly opted back in.
@PART[strl-rad-sink-*]:NEEDS[SterlingSystems/Thermals,KerbalismRadiatorRenameLegacy]:BEFORE[Kerbalism]
{
	@MODULE[ModuleSystemHeatRadiator]
	{
		@name = SystemHeatRadiatorKerbalism
	}
}

@PART[strl-rad-wrap?-*]:NEEDS[SterlingSystems/Thermals,KerbalismRadiatorRenameLegacy]:BEFORE[Kerbalism]
{
	@MODULE[ModuleSystemHeatRadiator]
	{
		@name = SystemHeatRadiatorKerbalism
	}
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[Height]]
	{
		@SUBTYPE,*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleSystemHeatRadiator]]
			{
				@IDENTIFIER
				{
					@name = SystemHeatRadiatorKerbalism
				}
			}
		}
	}
}


@PART[strl-worldpower-tcs?]:NEEDS[CommunityResourcePack,Kerbalism,SterlingSystems,SystemHeat]{
	@tags ^= :$: _kerbalism

	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[SystemHeatConverterKerbalism],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}
	!MODULE[PlannerController],* {}

	MODULE
	{
		name = ProcessControllerB9ResourceSync
	}

	MODULE
	{
		name = ProcessControllerSystemHeat
		processID = Convector
		resource = _ConvectorAir
		title = #KERBALISM_BranchLoc_ISRU_Convector
		capacity = #$/refFlow$
		systemHeatModuleID = default
		shutdownTemperature = 1600
		systemOutletTemperature = 350
		systemPower = #$/refPower$
		@systemPower *= -1
		AutoShutdown = false
		GeneratesHeat = false
		deployModuleType = Convector
		requireDeploy = true
		systemEfficiency
		{
			key = 308 0
			key = 308.15 1 0 0
		}
	}

	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[Coolant]]
	{
		@SUBTYPE[Air]
		{
			MODULE
			{
				IDENTIFIER
				{
					name = ProcessControllerSystemHeat
					processID = Convector
				}
				DATA
				{
					resource = _ConvectorAir
					title = #KERBALISM_BranchLoc_ISRU_Convector
				}
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleSystemHeat
					moduleID = default
				}
				DATA
				{
					volume = #$/refVolume0$
				}
			}
		}
		@SUBTYPE[Water]
		{
			@MODULE,0
			{
				@IDENTIFIER
				{
					@name = ProcessControllerSystemHeat
					processID = Convector
				}
				@DATA
				{
					!RESOURCE {}
					!INPUT_RESOURCE {}
					resource = _ConvectorWater
					title = #KERBALISM_BranchLoc_ISRU_Convector
				}
			}
		}
	}
}

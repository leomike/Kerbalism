// Dedupe MAECAlumina B9 tank type.
!B9_TANK_TYPE[MAECAlumina]:NEEDS[CommunityResourcePack,B9PartSwitch,SterlingSystems]:BEFORE[Kerbalism] { }

B9_TANK_TYPE:NEEDS[CommunityResourcePack,B9PartSwitch,SterlingSystems]
{
	name = ZKB_MAECAlumina
	tankMass = 0
	tankCost = 0

	RESOURCE
	{
		name = ElectricCharge
		unitsPerVolume = 1
	}
	RESOURCE
	{
		name = Aluminium
		unitsPerVolume = 2.5
	}
	RESOURCE
	{
		name = Alumina
		unitsPerVolume = 2.5
		percentFilled = 0
	}
}

@B9_TANK_TYPE[ZKB_MAECAlumina]:NEEDS[CommunityResourcePack,B9PartSwitch,SterlingSystems]:AFTER[Kerbalism]
{
	@name = MAECAlumina
}

// World Power solar thermal collectors (sths/sthm/sthxl): KerbalismDefault treats
// ModuleDeployableSolarPanel as EC panels; use ThermalPanelFixer for ThermalPower instead.
@PART[strl-worldpower-sth*]:HAS[@MODULE[ModuleDeployableSolarPanel]]:AFTER[KerbalismDefault]:NEEDS[SterlingSystems/WorldPower,Kerbalism]
{
	!MODULE[Reliability]:HAS[#type[SolarPanelFixer]],* {}
	!MODULE[SolarPanelFixer],* {}
	!MODULE[ModuleResourceConverter],* {}
	MODULE
	{
		name = PlannerController
		title = Solar Thermal Panel
		considered = true
	}
	+MODULE[ModuleDeployableSolarPanel],*
	{
		-is* = delete
		-re* = delete
		-ex* = delete
		-animationName = delete
		-secondaryTransformName = delete
		-chargeRate = delete
		-pivotName = delete
		@name = ThermalPanelFixer
		-powerCurve {}
		-temperatureEfficCurve {}
		-timeEfficCurve {}
		-UPGRADES {}
	}
}

@PART[strl-worldpower-sth*]:HAS[@MODULE[ModuleDeployableSolarPanel]]:NEEDS[SterlingSystems/WorldPower,Kerbalism,FeatureReliability]
{
	MODULE
	{
		name = Reliability
		type = ThermalPanelFixer
		title = Solar Thermal Panel
		redundancy = Power Generation
		repair = Engineer@2
		mtbf = 145152000
		extra_cost = 1.5
		extra_mass = 0.5
	}
}

// sthl uses ModuleDualAxisSolarPanel (not MDSP); Planner only.
@PART[strl-worldpower-sthl]:AFTER[KerbalismDefault]:NEEDS[SterlingSystems/WorldPower,Kerbalism]
{
	MODULE
	{
		name = PlannerController
		title = Solar Thermal Panel
		considered = true
	}
}

@PART[strl-worldpower-sth1]:AFTER[KerbalismDefault]:NEEDS[SterlingSystems/WorldPower,Kerbalism]
{
	!MODULE[ModuleResourceConverter],* {}
	!MODULE[ModuleCoreHeat],* {}
	!MODULE[ModuleOverheatDisplay],* {}
	!MODULE[PlannerController]:HAS[#title[#KERBALISM_Brokers_StockConverter]],* {}
	!MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}
	!MODULE[ProcessController]:HAS[#resource[_STH1TECLow]],* {}
	!MODULE[ProcessControllerDeployable]:HAS[#processID[SolarThermalConverter]],* {}
	!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[Quality]],* {}

	MODULE
	{
		name = PlannerController
		title = Solar Thermal Panel
		considered = true
	}

	MODULE
	{
		name = ProcessControllerB9ResourceSync
	}

	MODULE
	{
		name = ProcessController
		resource = _STH1TECLow
		title = #LOC_strl_converter_thermoelectric
		capacity = 1
		toggle = true
	}

	MODULE:NEEDS[B9PartSwitch]
	{
		name = ModuleB9PartSwitch
		moduleID = Quality
		switcherDescription = #KERBALISM_BranchLoc_Quality
		switcherDescriptionPlural = #KERBALISM_BranchLoc_Qualities
		switchInFlight = True
		SUBTYPE
		{
			name = Low
			title = #KERBALISM_BranchLoc_Low_Temperature
			primaryColor = DarkOrange
			secondaryColor = gray
			descriptionSummary = #LOC_strl-worldpower-sth1-lowPower
			descriptionDetail = #$@STRLB9LOC/txtGenMain$$@STRLB9LOC/txtInputs$ 0.6 TP/s. <br>$@STRLB9LOC/txtOutputs$ 300 EC/s.<br> $@STRLB9LOC/txtGenEff$ 50%.  $@STRLB9LOC/txtQuickloadWarn$
			MODULE
			{
				IDENTIFIER
				{
					name = ProcessController
					resource = _STH1TECLow
				}
				DATA
				{
					resource = _STH1TECLow
					title = #LOC_strl_converter_thermoelectric
				}
			}
		}
		SUBTYPE
		{
			name = High
			title = #KERBALISM_BranchLoc_High_Temperature
			primaryColor = Mango
			secondaryColor = gray
			descriptionSummary = #LOC_strl-worldpower-sth1-highPower
			descriptionDetail = #$@STRLB9LOC/txtGenMain$$@STRLB9LOC/txtInputs$ 3.6 TP/s. <br>$@STRLB9LOC/txtOutputs$ 900 EC/s.<br> $@STRLB9LOC/txtGenEff$ 25%.  $@STRLB9LOC/txtQuickloadWarn$
			MODULE
			{
				IDENTIFIER
				{
					name = ProcessController
					resource = _STH1TECLow
				}
				DATA
				{
					resource = _STH1TECHigh
					title = #LOC_strl_converter_thermoelectric
				}
			}
		}
	}
}

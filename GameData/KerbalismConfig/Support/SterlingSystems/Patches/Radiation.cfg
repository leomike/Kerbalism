//
// Nuclear Reactors
//

@PART[strl-rctrms*]:NEEDS[FeatureRadiation]
{
	MODULE
	{
		name = Emitter
		radiation = #$/mass$
		@radiation != 0.85
		@radiation *= 2.77778E-05
	}
}

@PART[strl-rctrpb*]:NEEDS[FeatureRadiation]
{
	MODULE
	{
		name = Emitter
		radiation = #$/mass$
		@radiation != 0.8
		@radiation *= 2.77778E-05
	}
}

// BVG
@PART[strl-rctrbv??]:NEEDS[FeatureRadiation]
{
	!MODULE[ModuleGenerator] {}
	MODULE
	{
		name = ProcessController
		resource = _BVG
		title = #KERBALISM_BranchLoc_BVG
		capacity = 0.125
		running = true
		toggle = false
	}
}
@PART[strl-rctrbv02]:NEEDS[FeatureRadiation]
{
	@MODULE[ProcessController]:HAS[#resource[?BVG]]
	{
		@capacity = 0.375
	}
}
@PART[strl-rctrbv03]:NEEDS[FeatureRadiation]
{
	@MODULE[ProcessController]:HAS[#resource[?BVG]]
	{
		@capacity = 0.75
	}
}
@PART[strl-rctrbv04]:NEEDS[FeatureRadiation]
{
	@MODULE[ProcessController]:HAS[#resource[?BVG]]
	{
		@capacity = 1.5
	}
}


//
// Engines
//

@PART[strl-eng*icf|strl-eng*mcf|strl-eng*bcam|strl-eng*suleu]:NEEDS[FeatureRadiation]
{
	// Logic based around requiring [ (Thrust * Isp) / Mass cubed ] 
	// Given the part stats from stock NERV the radiation value should be the same as that --> 2.77778E-05
	radPower = #$MODULE[ModuleEnginesFX],0/atmosphereCurve/key,0[1, ]$
	@radPower *= #$MODULE[ModuleEnginesFX],0/maxThrust$
	radMass = #$mass$
	@radMass != 3
	@radPower /= #$radMass$
	@radPower /= 1.4E+08 // tuning factor
}
@PART[strl-eng*gc]:NEEDS[FeatureRadiation] // An exception to the rule established above. Keep gas cores relatively scary
{
	radPower = #$MODULE[ModuleEnginesFX],0/atmosphereCurve/key,0[1, ]$
	@radPower *= #$MODULE[ModuleEnginesFX],0/maxThrust$
	radMass = #$mass$
	@radMass != 3
	@radPower /= #$radMass$
	@radPower /= 6.0E+06 // tuning factor
}
@PART[strl-eng*icf|strl-eng*mcf|strl-eng*bcam|strl-eng*gc|strl-eng*suleu]:NEEDS[FeatureRadiation]:AFTER[Kerbalism]
{
	MODULE
	{
		name = Emitter
		radiation = #$/radPower$
		Tag = SS
	}
}

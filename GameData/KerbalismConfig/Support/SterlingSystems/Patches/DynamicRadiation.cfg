// ============================================================================
// DynamicRadiation.cfg
// Bridge integration support merged from KerbalismBridge.
// ============================================================================


// ============================================================================
// KerbalismBridge integration: SterlingSystemsReactors.cfg
// ============================================================================
// Dynamic radiation for Sterling reactors
@PART[strl-rctrms-*|strl-rctrpb-*]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[ProcessControllerSystemHeat]]:NEEDS[Kerbalism,FeatureRadiation,SterlingSystems]:FOR[zzzzzzz_KerbalismDynamicRadiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ProcessControllerSystemHeat
		powerActiveMode = any_running
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_EmissionDecayRate$
	}
}


// ============================================================================
// KerbalismBridge integration: SterlingSystemsEngines.cfg
// ============================================================================
// Dynamic radiation for Sterling engines

@PART[strl-eng-*-suleu]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_SULEU]]]:NEEDS[Kerbalism,FeatureRadiation,SterlingSystems]:FOR[zzzzzzz_KerbalismDynamicRadiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ProcessControllerSystemHeat
		powerModuleId = _SULEU
		powerActiveMode = running
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_EmissionDecayRate$
	}
}

@PART[strl-eng-375-ccgc|strl-eng-375-ocgc|strl-eng-1000-bcam]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[ModuleEnginesFX]]:NEEDS[Kerbalism,FeatureRadiation,SterlingSystems]:FOR[zzzzzzz_KerbalismDynamicRadiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ModuleEnginesFX
		powerActiveMode = thrust
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_EmissionDecayRate$
	}
}

@PART[strl-eng-375-mcf|strl-eng-*-icf]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[FFTFusionEngineKerbalismUpdater]]:NEEDS[Kerbalism,FeatureRadiation,SterlingSystems,FarFutureTechnologies]:FOR[zzzzzzz_KerbalismDynamicRadiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ModuleFusionEngine
		powerModuleId = #$/MODULE[FFTFusionEngineKerbalismUpdater]/engineModuleID$
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_EmissionDecayRate$
	}
}

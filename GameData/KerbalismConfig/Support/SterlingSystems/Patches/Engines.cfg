// Sterling engine routing.

@PART[strl-eng-*-suleu]:HAS[@MODULE[ModuleSystemHeatConverter]:HAS[#moduleID[*]]]:NEEDS[Kerbalism,SystemHeat,SterlingSystems]:BEFORE[zzzzzz_KerbalismNative]
{
	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}
	!MODULE[PlannerController],* {}

	MODULE
	{
		name = ProcessControllerSystemHeat
		resource = _SULEU
		title = #LOC_strl_reactor_fission
		capacity = #$/mass$
		@capacity /= 1.8
		@capacity += 0.005
		@capacity *= 100
		@capacity = #$capacity[0,.]$
		@capacity /= 100
		systemHeatModuleID = reactor
		AutoShutdown = False
		GeneratesHeat = False
		shutdownTemperature = 1500
		systemOutletTemperature = 1100
		systemPower = #$/mass$
		@systemPower /= 1.8
		@systemPower += 0.005
		@systemPower *= 100
		@systemPower = #$systemPower[0,.]$
		@systemPower /= 100
		@systemPower *= 1275
		systemEfficiency
		{
			key = 0 1
			key = 1 1
		}
	}
}

@PART[strl-eng-*-suleu]:NEEDS[Kerbalism,SystemHeat,SterlingSystems]{
	!MODULE[ProcessController],* {}
	!MODULE[ProcessControllerSystemHeat],* {}
	!MODULE[ModuleSystemHeatFissionEngine],* {}
	!MODULE[SystemHeatFissionEngineKerbalismUpdater],* {}
}

// ICF engine embedded FusionPellets fabricator
@PART[strl-eng-500-icf]:HAS[@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[FusionPellets]]]:NEEDS[Kerbalism,SystemHeat,SterlingSystems]:BEFORE[zzzzzz_KerbalismNative]
{
	!MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[FusionPellets]],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}

	MODULE
	{
		name = ProcessControllerSystemHeat
		resource = _FusionPellets
		title = #KERBALISM_BranchLoc_FusionPellets
		capacity = 1
		systemHeatModuleID = isru
		AutoShutdown = False
		GeneratesHeat = False
		shutdownTemperature = 500
		systemOutletTemperature = 300
		systemPower = 45
		systemEfficiency
		{
			key = 0 0
			key = 300 1 0 0
			key = 400 1 0 0
			key = 550 0
		}
	}
}

// Exclude gas-core / thermal-nozzle engines from fission-engine patches
@PART[strl-eng-375-ccgc|strl-eng-375-ocgc|strl-eng-1000-bcam|strl-eng-*-thnozbell|strl-eng-062-thnr-01|strl-eng-*-thnf-01|strl-eng-062-thnj-01|strl-eng-*-thns*-01]:NEEDS[Kerbalism,SystemHeat,SterlingSystems]{
	!MODULE[ProcessController],* {}
	!MODULE[ProcessControllerSystemHeat],* {}
	!MODULE[ModuleSystemHeatFissionEngine],* {}
	!MODULE[SystemHeatFissionEngineKerbalismUpdater],* {}
}

// MCF/ICF with FFT installed
@PART[strl-eng-375-mcf|strl-eng-*-icf]:HAS[@MODULE[ModuleFusionEngine]:HAS[#ModuleID[*]],!MODULE[FFTFusionEngineKerbalismUpdater]]:NEEDS[Kerbalism,FarFutureTechnologies,SterlingSystems]:AFTER[zzzzzz_KerbalismFFT]
{
	MODULE
	{
		name = FFTFusionEngineKerbalismUpdater
		engineModuleID = #$../MODULE[ModuleFusionEngine]:HAS[#ModuleID[*]],0/ModuleID$
	}

	!MODULE[ProcessController],* {}
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		title = #KERBALISM_Brokers_FusionEngine
		considered = true
	}
}

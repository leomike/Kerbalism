// World Power wind turbines -> ProcessController (deploy gating only).

@PART[strl-worldpower-wm1]:HAS[@MODULE[ModuleResourceConverter]:HAS[#ConverterName[STRL?Wind]]]:NEEDS[CommunityResourcePack,Kerbalism,SterlingSystems]{
	@tags ^= :$: _kerbalism

	!MODULE[ModuleResourceConverter],* {}
	!MODULE[PlannerController],* {}
	!MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}

	MODULE
	{
		name = ModuleAnimationGroup
		deployAnimationName = unboxing
		activeAnimationName = turbineSpin
		deployActionName = Deploy Turbine
		retractActionName = Retract Turbine
		toggleActionName = #KERBALISM_BranchLoc_Toggle_packaging
		moduleType = Generator
	}

	MODULE
	{
		name = ProcessControllerDeployable
		processID = WindTurbine
		resource = _WindTurbine1
		title = #KERBALISM_BranchLoc_Wind_Turbine
		capacity = 1
		deployModuleType = Generator
		requireDeploy = true
	}

	MODULE:NEEDS[FeatureReliability]
	{
		name = Reliability
		type = ProcessControllerDeployable
		title = #KERBALISM_BranchLoc_Wind_Turbine
		redundancy = Power Generation
		repair = Engineer
		mtbf = 72576000
		extra_cost = 1.0
		extra_mass = 0.2
	}
}


// Engine reliability

@PART[strl*]:HAS[@MODULE[ModuleEngines*],@MODULE[Reliability]:HAS[#type[ModuleEngines*]]]:NEEDS[FeatureReliability,SterlingSystems]:AFTER[KerbalismDefault]
{
	@MODULE[Reliability]:HAS[#type[ModuleEngines*]]
	{
		@rated_operation_duration = 0
		@rated_ignitions = -1
		@turnon_failure_probability = 0.001
		@extra_cost = 1.25
		@extra_mass = 0.05
		@repair = Engineer@5
	}
}

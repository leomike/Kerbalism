// SCM
@PART[strl-rctrscm]:NEEDS[CommunityResourcePack,Kerbalism,SystemHeat,SterlingSystems]{
	@tags ^= :$: _kerbalism

	RESOURCE
	{
		name = EnrichedUranium
		amount = 40
		maxAmount = 40
		@amount *= #$/refPower$
		@maxAmount *= #$/refPower$
	}
	RESOURCE
	{
		name = DepletedFuel
		amount = 0
		maxAmount = 40
		@maxAmount *= #$/refPower$
	}
	RESOURCE
	{
		name = ElectricCharge
		amount = 40
		maxAmount = 40
		@amount *= #$/refPower$
		@maxAmount *= #$/refPower$
	}

	addedCost = #$@RESOURCE_DEFINITION[EnrichedUranium]/unitCost$
	@addedCost *= 40
	@addedCost *= #$/refPower$
	@cost += #$addedCost$

	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[ModuleResourceConverter],* {}
	!MODULE[SystemHeatConverterKerbalism],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}
	!MODULE[PlannerController],* {}
	!MODULE[ModuleOverheatDisplay] {}
	!MODULE[ModuleCoreHeat] {}

	MODULE
	{
		name = ProcessController
		resource = _SCMDecay
		title = #KERBALISM_BranchLoc_SCM_Decay_Generator
		capacity = #$/refPower$
		running = true
		toggle = false
	}

	MODULE
	{
		name = ProcessController
		resource = _SCM
		title = #LOC_strl_reactor_fission
		capacity = #$/refPower$
		toggle = true
	}

	MODULE:NEEDS[FeatureReliability]
	{
		name = Reliability
		type = ProcessController
		title = #LOC_strl_rctrscm_title
		repair = Engineer
		mtbf = 72576000
		extra_cost = 1.0
		extra_mass = 0.2
	}
}


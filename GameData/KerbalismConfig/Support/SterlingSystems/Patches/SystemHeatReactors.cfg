// Sterling reactors -> ProcessController + SystemHeat.

@PART[strl-rctrms-*]:NEEDS[Kerbalism,SystemHeat,SterlingSystems]{
	@tags ^= :$: _kerbalism

	flowWH = 65
	@flowWH *= #$/refPower$

	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[ModuleResourceConverter],* {}
	!MODULE[SystemHeatConverterKerbalism],* {}
	!MODULE[ModuleOverheatDisplay] {}
	!MODULE[ModuleCoreHeat] {}

	MODULE
	{
		name = ProcessController
		resource = _MSR
		title = #LOC_strl_reactor_fission
		capacity = #$/refPower$
	}
	MODULE:NEEDS[CommunityResourcePack]
	{
		name = ProcessController
		resource = _BreederMSR
		title = #KERBALISM_BranchLoc_Tritium_Breeder_MSR
		capacity = #$/refPower$
	}

	MODULE
	{
		name = Configure
		title = #KERBALISM_BranchLoc_Sterling_Molten_Salt_Reactor
		slots = 1
		reconfigure = engineer@5
		SETUP
		{
			name = #KERBALISM_BranchLoc_MSR
			desc = #KERBALISM_BranchLoc_The_standard_nuclear_salt_reaction
			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _MSR
			}
		}
		SETUP:NEEDS[CommunityResourcePack]
		{
			name = #KERBALISM_BranchLoc_Breeder_MSR
			desc = #KERBALISM_BranchLoc_The_standard_nuclear_salt_reaction_with_a_molten
			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _BreederMSR
			}
		}
	}

	MODULE:NEEDS[FeatureReliability]
	{
		name = Reliability
		type = ProcessController
		title = #KERBALISM_BranchLoc_Molten_Salt_Reactor
		repair = Engineer
		mtbf = 72576000
		extra_cost = 1.0
		extra_mass = 0.2
	}
}


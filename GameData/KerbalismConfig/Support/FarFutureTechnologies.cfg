// ============================================================================
// FarFutureTechnologies.cfg
// Bridge integration support merged from KerbalismBridge.
// ============================================================================


// ============================================================================
// KerbalismBridge integration: Settings.cfg
// ============================================================================
KERBALISM_FFT_SETTINGS
{
	FFT_Engines_Radioactivity_Coeff = 1.0
	FFT_FusionReactors_Radioactivity_Coeff = 1.0
	FFT_Industrial_Radioactivity_Coeff = 1.0

	// Antimatter containment (background unloaded vessels)
	// BackgroundDetonation: false = no background annihilation when containment is off
	Antimatter_BackgroundDetonation = true
	// GraceSeconds: cumulative EC deficit before containment shuts down (0 = single-step check)
	Antimatter_DetonationGraceSeconds = 0
	// MaxDetonationPerStep: cap units lost per background tick (0 = unlimited)
	Antimatter_MaxDetonationPerStep = 0
}


// ============================================================================
// KerbalismSupport profile: supplies + industrial processes
// (merged from FFTKerbalismSupport.cfg + FFTIndustrialProfile.cfg)
// ============================================================================
Profile
{
	name = KerbalismSupport
	modname = Far Future Technologies
	moddir = FarFutureTechnologies

	Supply
	{
		resource = Antimatter
		low_message = #KERBALISM_FFT_low_Antimatter
		empty_message = #KERBALISM_FFT_empty_Antimatter
		refill_message = #KERBALISM_FFT_refill_Antimatter
	}

	Supply
	{
		resource = LqdDeuterium
		low_message = #KERBALISM_FFT_low_Deuterium
		empty_message = #KERBALISM_FFT_empty_Deuterium
		refill_message = #KERBALISM_FFT_refill_Deuterium
	}

	Supply
	{
		resource = LqdHe3
		low_message = #KERBALISM_FFT_low_He3
		empty_message = #KERBALISM_FFT_empty_He3
		refill_message = #KERBALISM_FFT_refill_He3
	}

	Process
	{
		name = FFTAntimatterLight
		title = #KERBALISM_BranchLoc_Antimatter_Factory_Light_Elements
		modifier = _FFTAMLite
		input = LqdHydrogen@1
		input = ElectricCharge@10000
		output = Antimatter@5
	}

	Process
	{
		name = FFTAntimatterHeavy
		title = #KERBALISM_BranchLoc_Antimatter_Factory_Heavy_Elements
		modifier = _FFTAMHeavy
		input = FissionPellets@1
		input = ElectricCharge@10000
		output = Antimatter@500
	}

	Process
	{
		name = FFTNuclearSaltWater
		title = #KERBALISM_BranchLoc_Nuclear_Salt_Water
		modifier = _FFTNSW
		input = Ore@1
		input = EnrichedUranium@0.005
		input = ElectricCharge@15
		output = NuclearSaltWater@5
	}

	Process
	{
		name = FFTFissionDust
		title = #KERBALISM_BranchLoc_Fission_Dust
		modifier = _FFTFissionDust
		input = EnrichedUranium@1
		input = ElectricCharge@150
		output = FissionParticles@10
	}

	Process
	{
		name = FFTFissionPellets
		title = #KERBALISM_BranchLoc_Fission_Pellets
		modifier = _FFTFissionPellets
		input = EnrichedUranium@1
		input = ElectricCharge@150
		output = FissionPellets@10
	}
}

RESOURCE_DEFINITION
{
	name = _FFTAMLite
	density = 0.0
	isVisible = false
}
RESOURCE_DEFINITION
{
	name = _FFTAMHeavy
	density = 0.0
	isVisible = false
}
RESOURCE_DEFINITION
{
	name = _FFTNSW
	density = 0.0
	isVisible = false
}
RESOURCE_DEFINITION
{
	name = _FFTFissionDust
	density = 0.0
	isVisible = false
}
RESOURCE_DEFINITION
{
	name = _FFTFissionPellets
	density = 0.0
	isVisible = false
}


// ============================================================================
// KerbalismBridge integration: FFTFusionReactors.cfg
// ============================================================================
// Standalone FFT FusionReactor -> Layer B (native module keeps startup/modes/throttle)
@PART[*]:HAS[@MODULE[FusionReactor]:HAS[#ModuleID[*]],!MODULE[FFTFusionReactorKerbalismUpdater]]:NEEDS[Kerbalism,FarFutureTechnologies]:FOR[zzzzzz_KerbalismFFT]
{
	MODULE
	{
		name = FFTFusionReactorKerbalismUpdater
		reactorModuleID = #$/MODULE[FusionReactor]:HAS[#ModuleID[*]],0/ModuleID$
	}

	!MODULE[ProcessController],* {}
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		plannerId = fusionReactor
		title = #KERBALISM_Brokers_FusionReactor
		considered = true
	}
}


// ============================================================================
// KerbalismBridge integration: FFTFusionEngines.cfg
// ============================================================================
// FFT fusion engines -> Layer B resource routing
@PART[*]:HAS[@MODULE[ModuleFusionEngine]:HAS[#ModuleID[*]],!MODULE[FFTFusionEngineKerbalismUpdater]]:NEEDS[Kerbalism,FarFutureTechnologies]:FOR[zzzzzz_KerbalismFFT]
{
	MODULE
	{
		name = FFTFusionEngineKerbalismUpdater
		engineModuleID = #$/MODULE[ModuleFusionEngine]:HAS[#ModuleID[*]],0/ModuleID$
	}

	!MODULE[ProcessController],* {}
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		plannerId = fusionEngine
		title = #KERBALISM_Brokers_FusionEngine
		considered = true
	}
}


// ============================================================================
// KerbalismBridge integration: FFTAntimatterTanks.cfg
// ============================================================================
// Keep native ModuleAntimatterTank (FFT UI/part info) and route resources via updater.

@PART[*]:HAS[@MODULE[ModuleAntimatterTank],!MODULE[FFTAntimatterTankKerbalismUpdater]]:NEEDS[Kerbalism,FarFutureTechnologies]:FOR[zzzzzz_KerbalismFFT]
{
	MODULE
	{
		name = FFTAntimatterTankKerbalismUpdater
	}

	MODULE
	{
		name = PlannerController
		plannerId = antimatterTank
		title = #KERBALISM_Brokers_AntimatterTank
		considered = true
	}
}


// ============================================================================
// KerbalismBridge integration: FFTAntimatterTanks_B9PartSwitch.cfg
// ============================================================================
// B9PartSwitch -> keep native ModuleAntimatterTank identifiers

@PART[*]:HAS[@MODULE[ModuleAntimatterTank],@MODULE[ModuleB9PartSwitch]]:NEEDS[Kerbalism,FarFutureTechnologies,B9PartSwitch]:AFTER[zzzzzz_KerbalismFFT]
{
	@MODULE[ModuleB9PartSwitch],*
	{
		@SUBTYPE,*
		{
			@MODULE:HAS[@IDENTIFIER[ModuleAntimatterTank]]
			{
				@IDENTIFIER
				{
					@name = ModuleAntimatterTank
				}
			}
		}
	}
}


// ============================================================================
// KerbalismBridge integration: FFT_Regoliths_SystemHeat.cfg
// ============================================================================
// FFT regolith scoops -> HarvesterSystemHeat
// Preserve FFT harvester balance: HarvestThreshold -> min_abundance, Efficiency -> rate, abundance_rate = 1

@PART[fft-regolith-scoop-1]:FINAL:HAS[@MODULE[ModuleSystemHeatHarvester]:HAS[#ResourceName[LqdHe3]]]:NEEDS[FarFutureTechnologies,Kerbalism,SystemHeat]
{
    %MODULE[Configure]
    {
        %name = Configure
        %configureId = Drill
        %title = #KERBALISM_BranchLoc_Drill
        %slots = 1
        SETUP
        {
            name = #KERBALISM_BranchLoc_LqdHe3_Extraction
            desc = #KERBALISM_BranchLoc_Extract_LqdHe3_from_the_surface
            MODULE
            {
                type = HarvesterSystemHeat
                id_field = resource
                id_value = LqdHe3
            }
            RESOURCE
            {
                name = LqdHe3
                amount = 0
                maxAmount = 50
            }
        }
    }

    +MODULE[ModuleSystemHeatHarvester]:HAS[#ResourceName[LqdHe3]]
    {
        @name = HarvesterSystemHeat
        %title    = #KERBALISM_BranchLoc_LqdHe3_Extraction
        %resource = #$ResourceName$
        %type     = #$HarvesterType$
        %drill    = #$ImpactTransform$
        %length   = #$ImpactRange$

        %min_abundance = #$HarvestThreshold$
        %rate = #$Efficiency$
        %abundance_rate = 1

        %ec_rate = #$INPUT_RESOURCE/Ratio$
        %systemHeatModuleID = harvester
        %systemPower = #$systemPower$
        %shutdownTemperature = #$shutdownTemperature$
        %systemOutletTemperature = #$systemOutletTemperature$
        %GeneratesHeat = false

        !HarvestThreshold = DELETE
        !Efficiency      = DELETE
        !ImpactTransform  = DELETE
        !ImpactRange      = DELETE
        !HarvesterType    = DELETE
        !ResourceName     = DELETE
        !ConverterName    = DELETE
        !StartActionName  = DELETE
        !StopActionName   = DELETE
        !ToggleActionName = DELETE
        !INPUT_RESOURCE,* {}
    }

    !MODULE[ModuleSystemHeatHarvester]:HAS[#ResourceName[LqdHe3]] {}
}


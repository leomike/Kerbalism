// ============================================================================
// Kerbalism support: PlanetaryBaseInc nuclear parts
// - KKAOSS_Nuclear_Reactor: Layer A ProcessController (_Nukereactor via NFE profile). Layer B ProcessControllerSystemHeat.
//   SystemHeatFissionReactors adds ModuleSystemHeatFissionReactor; PBS Kerbalism adds ProcessController (_KPBSNukereactor).
//   Unified on the Kerbalism ProcessControllerSystemHeat path (same as NFE nfe-reactor-* / Buffalo S.A.F.E.R.).
// - KKAOSS_Centrifuge: Layer A from PlanetaryBaseInc Kerbalism (_KPBS_*). Layer B mirrors NFE nuclear recycler SystemHeat.
// ============================================================================

@PART[KKAOSS_Nuclear_Reactor]:NEEDS[PlanetaryBaseInc,Kerbalism,ProfileDefault]:BEFORE[zzzzzz_KerbalismNative]
{
	!MODULE[SystemHeatFissionReactorKerbalismUpdater],* {}
}

@PART[KKAOSS_Nuclear_Reactor]:HAS[@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Nukereactor]],!MODULE[ModuleSystemHeat]]:NEEDS[Kerbalism,SystemHeat,PlanetaryBaseInc,NearFutureElectrical]:AFTER[zzzzzz_KerbalismNative]
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = 1.25
		moduleID = reactor
		iconName = Icon_Nuclear
	}
}

@PART[KKAOSS_Nuclear_Reactor]:HAS[@MODULE[ProcessController]:HAS[#resource[_KPBSNukereactor]]]:NEEDS[Kerbalism,SystemHeat,PlanetaryBaseInc,NearFutureElectrical,ProfileDefault]:BEFORE[zzzzzz_KerbalismNative]
{
	!MODULE[ModuleSystemHeatFissionReactor],* {}
	!MODULE[ModuleSystemHeatFissionFuelContainer],* {}

	@MODULE[ProcessController]:HAS[#resource[_KPBSNukereactor]]
	{
		@resource = _Nukereactor
		@capacity = 120
		@valve_i = 1
		@name = ProcessControllerSystemHeat
		%systemHeatModuleID = reactor
		%systemOutletTemperature = 850
		// SystemHeat HeatGeneration 2000 kW − ElectricalGeneration 1200 EC/s waste heat
		%systemPower = 800
		%CurrentPowerPercent = 100
		%MinimumThrottle = 25
		%meltdownTemperature = 1300
		%MaximumTemperature = 2000
		%CoreDamageRate = 0.007
		%CurrentSafetyOverride = 1000
		%allowManualShutdownTemperatureControl = true
		%AutoShutdown = true
		!coreDamageCurve {}
		coreDamageCurve
		{
			key = 1300 0.25
			key = 1650 0.75
			key = 2000 1.0
		}
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0    0.0
			key = 850  1.0
			key = 1300 0.0
		}
	}

	!MODULE[PlannerController],* {}
}

@PART[KKAOSS_Nuclear_Reactor]:HAS[@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Nukereactor]],!MODULE[Reliability]:HAS[#type[ProcessControllerSystemHeat]]]:NEEDS[Kerbalism,SystemHeat,PlanetaryBaseInc,NearFutureElectrical,FeatureReliability]:FINAL
{
	!MODULE[Reliability]:HAS[#type[ModuleSystemHeatFissionReactor]],* {}

	MODULE
	{
		name = Reliability
		type = ProcessControllerSystemHeat
		title = #KERBALISM_BranchLoc_Fission_Reactor
		redundancy = Power Generation
		repair = Engineer
		// EnrichedUranium 250 / SystemHeat INPUT_RESOURCE ratio (~20 Kerbin years)
		mtbf = 66684437
		extra_cost = 2.5
		extra_mass = 1.0
	}
}

// ============================================================================
// Kerbalism support: KPBS Centrifuge (KKAOSS_Centrifuge)
// Layer A: PlanetaryBaseInc Kerbalism (ProcessController _KPBS_*, capacity 1 — author recipes in KPBS_MM_Kerbalism_Default).
// Layer B: ProcessControllerSystemHeat + SystemHeat loop (NFE recycler outlet/shutdown curve).
// systemPower scaled from NFE recycler-25-1 by EC ratio vs NFE@capacity10 (200/100/200 → KPBS 120/60/60).
// Note: ModuleSystemHeat must be added AFTER KPBS Layer A (default pass). A same-pass HAS on
// ProcessController races KerbalismConfig vs PlanetaryBaseInc path order and can miss.
// ============================================================================

@PART[KKAOSS_Centrifuge]:NEEDS[PlanetaryBaseInc,Kerbalism,ProfileDefault]:BEFORE[zzzzzz_KerbalismNative]
{
	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}
}

// FINAL: after KPBS Layer A (default). Same-pass ModuleSystemHeat add races path order and misses.
@PART[KKAOSS_Centrifuge]:HAS[@MODULE[ProcessController]:HAS[#resource[_KPBS_reprocessor_Centrifuge]],!MODULE[ModuleSystemHeat]]:NEEDS[Kerbalism,SystemHeat,PlanetaryBaseInc,ProfileDefault]:FINAL
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = 5.0
		moduleID = isru
		iconName = Icon_Gears
	}
}

@PART[KKAOSS_Centrifuge]:HAS[@MODULE[ProcessController]:HAS[#resource[_KPBS_reprocessor_Centrifuge]]]:NEEDS[Kerbalism,SystemHeat,PlanetaryBaseInc,ProfileDefault]:FINAL
{
	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}

	@MODULE[ModuleSystemHeat]:HAS[#moduleID[isru]]
	{
		%volume = 5.0
	}

	@MODULE[ProcessController]:HAS[#resource[_KPBS_reprocessor_Centrifuge]],*
	{
		@name = ProcessControllerSystemHeat
		%systemHeatModuleID = isru
		%shutdownTemperature = 850
		%systemOutletTemperature = 700
		// NFE 175 kW @ 200 EC/s → KPBS 120 EC/s
		%systemPower = 105
		%AutoShutdown = true
		%GeneratesHeat = false
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0   0.0
			key = 700 1.0
			key = 850 0.0
		}
	}

	@MODULE[ProcessController]:HAS[#resource[_KPBS_xenonextractor_Centrifuge]],*
	{
		@name = ProcessControllerSystemHeat
		%systemHeatModuleID = isru
		%shutdownTemperature = 850
		%systemOutletTemperature = 700
		// NFE 75 kW @ 100 EC/s → KPBS 60 EC/s
		%systemPower = 45
		%AutoShutdown = true
		%GeneratesHeat = false
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0   0.0
			key = 700 1.0
			key = 850 0.0
		}
	}

	@MODULE[ProcessController]:HAS[#resource[_KPBS_uraniumextractor_Centrifuge]],*
	{
		@name = ProcessControllerSystemHeat
		%systemHeatModuleID = isru
		%shutdownTemperature = 850
		%systemOutletTemperature = 700
		// NFE 175 kW @ 200 EC/s → KPBS 60 EC/s (author recipe uses half the reprocessor power)
		%systemPower = 53
		%AutoShutdown = true
		%GeneratesHeat = false
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0   0.0
			key = 700 1.0
			key = 850 0.0
		}
	}

	@MODULE[Reliability]:HAS[#type[ProcessController]]
	{
		@type = ProcessControllerSystemHeat
	}

	@MODULE[Configure]
	{
		%configureId = NuclearCentrifuge
		@title = #KERBALISM_KPBS_NuclearCentrifuge_title

		@SETUP,*
		{
			@MODULE,*
			{
				@type = ProcessControllerSystemHeat
			}
		}

		// Upstream KPBS typo: uranium-extractor SETUP reused reprocessor loc key.
		@SETUP:HAS[@MODULE:HAS[#id_value[_KPBS_uraniumextractor_Centrifuge]]]
		{
			@name = #LOC_KPBS.centrifuge.uraniumextractor.name
		}
	}
}

// ============================================================================
// UniversalStorage2 - static panel support provided by SolarPanelFixer
// ============================================================================
@PART[*]:HAS[@MODULE[USSolarSwitch]]:FOR[KerbalismDefault]
{
	MODULE
	{
		name = SolarPanelFixer
	}
}

// Stock FuelCell mass 0.05t / capacity 1 (H2) and 5 (monoprop)
// US small wedge mass 0.05t → same as stock
@PART[USFuelCellSmal]:NEEDS[ProfileDefault]:FOR[KerbalismDefault]
{
  !MODULE[ModuleResourceConverter] {}
  !RESOURCE[ElectricCharge] {}

  MODULE
  {
    name = ProcessController
    resource = _FuelCell
    title = #KERBALISM_H2O2FuelCell_title
    capacity = 1
    valve_i = 1
  }

  MODULE
  {
    name = ProcessController
    resource = _MonopropFuelCell
    title = #KERBALISM_MonopropO2FuelCell_title
    capacity = 5
  }

  MODULE
  {
    name = Configure
    configureId = FuelCell
    title = #KERBALISM_FuelCell_title
    slots = 1

    SETUP
    {
      name = Hydrogen Oxygen Fuel Cell
      title = #KERBALISM_H2O2FuelCell_title
      desc = #KERBALISM_H2O2FuelCell_desc//Burns <b>Hydrogen</b> gas and <b>Oxygen</b> gas, producing <b>Water</b> as a by-product.

      MODULE
      {
        type = ProcessController
        id_field = resource
        id_value = _FuelCell
      }
    }

    SETUP
    {
      name = Monoprop Oxygen Fuel Cell
      title = #KERBALISM_MonopropO2FuelCell_title
      desc = #KERBALISM_MonopropO2FuelCell_desc2//Burns <b>MonoPropellant</b> and <b>Oxygen</b> gas, producing <b>Water</b> and <b>Nitrogen</b> gas as by-products.
      tech = basicScience

      MODULE
      {
        type = ProcessController
        id_field = resource
        id_value = _MonopropFuelCell
      }
    }
  }

  MODULE:NEEDS[FeatureReliability]
  {
    name = Reliability
    type = ProcessController
    title = #KERBALISM_FuelCell_title
    redundancy = Power Generation
    repair = Engineer
    mtbf = 72576000
    extra_cost = 1.0
    extra_mass = 0.33
  }

  @TechRequired = basicScience
}


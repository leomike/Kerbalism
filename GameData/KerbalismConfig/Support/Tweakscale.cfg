TWEAKSCALEEXPONENTS:NEEDS[FeatureHabitat,TweakScale]
{
  name = Habitat
  volume = 3
  surface = 2
}


// ============================================================================
// KerbalismBridge integration: ScaleTypes.cfg
// ============================================================================
SCALETYPE
{
	name = free_square_KSH
	freeScale = true
	defaultScale = 100
	suffix = %
	scaleFactors   = 50 , 75 , 100 ,  150 , 200
	incrementSlide =  1 ,  1 ,   1 ,    2 , 5
	TWEAKSCALEEXPONENTS { mass = 2.5 }
}


// ============================================================================
// KerbalismBridge integration: ScaleExponents.cfg
// ============================================================================
TWEAKSCALEEXPONENTS
{
	name = SystemHeatRadiatorKerbalism
	convectiveArea = 2
}


// ============================================================================
// KerbalismBridge integration: Radiators.cfg
// ============================================================================
@PART[*]:HAS[@MODULE[SystemHeatRadiatorKerbalism],!MODULE[ModuleEngines*],!MODULE[TweakScale]]:NEEDS[TweakScale]:AFTER[Kerbalism]
{
	%MODULE[TweakScale]
	{
		type = free_square_KSH
	}
}


// ============================================================================
// KerbalismBridge integration: CoolantTank.cfg
// ============================================================================
@PART[systemheat-coolant-tank-radial-1]:NEEDS[TweakScaleCompanion]:FOR[Kerbalism]
{
	%MODULE[TweakScale]
	{
		%type = free
	}
}

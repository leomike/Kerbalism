		data_rate = #$@KERBALISM_EXPERIMENT_VALUES/DMagicOrbitalScience/dmSolarParticles/size$
		@data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/DMagicOrbitalScience/dmSolarParticles/duration$
		ec_rate = 0.0
		allow_shrouded = False
		sample_collecting = True
	}

	MODULE
	{
		name = HardDrive
		experiment_id = dmSolarParticles
		sampleCapacity = 2
		dataCapacity = 0
	}

	!MODULE:HAS[#experimentID[dmSolarParticles],~name[Experiment]] {}
}

// ============================================================================
// Stock experiments on US wedges - restore deploy anims + dual sample slots
// ============================================================================

@PART[USMatBayWedge]:NEEDS[UniversalStorage2,FeatureScience]:AFTER[zzzKerbalismDefault]
{
	@MODULE[Experiment]:HAS[#experiment_id[mobileMaterialsLab]]
	{
		%anim_deploy = BayDoorOpen
		%sample_amount = 2
	}
}

@PART[USGooBayWedge]:NEEDS[UniversalStorage2,FeatureScience]:AFTER[zzzKerbalismDefault]
{
	@MODULE[Experiment]:HAS[#experiment_id[mysteryGoo]]
	{
		%anim_deploy = Canister1
		%sample_amount = 2
	}

	MODULE
	{
		name = ModuleAnimateGeneric
		animationName = GooBayOpen // canister retainers animation
		actionGUIName = #autoLOC_502068 //#autoLOC_502068 = Toggle
		startEventGUIName = #autoLOC_502069 //#autoLOC_502069 = Open
		endEventGUIName = #autoLOC_502051 //#autoLOC_502051 = Close
	}

	MODULE
	{
		name = ModuleAnimateGeneric
		animationName = Canister2 // right canister ejection animation
		stopAnimation = true // prevent autoplay
		actionAvailable = false // disable actions & PAW buttons...
		eventAvailableFlight = false
		eventAvailableEditor = false
		eventAvailableEVA = false
	}
}

@PART[USThermoBaroWedge]:NEEDS[UniversalStorage2,FeatureScience]:AFTER[zzzKerbalismDefault]
{
	@MODULE[Experiment]:HAS[#experiment_id[temperatureScan]]
	{
		%anim_deploy = ThermDeploy
	}
	@MODULE[Experiment]:HAS[#experiment_id[barometerScan]]
	{
		%anim_deploy = BaroDeploy
	}
}

@PART[USAccelGravWedge]:NEEDS[UniversalStorage2,FeatureScience]:AFTER[zzzKerbalismDefault]
{
	@MODULE[Experiment]:HAS[#experiment_id[gravityScan]]
	{
		%anim_deploy = GravDeploy
	}
	@MODULE[Experiment]:HAS[#experiment_id[seismicScan]]
	{
		%anim_deploy = AccelDeploy
	}
}

// ============================================================================
// Data storage / command hard drives
// ============================================================================

@PART[USDataStorageWedge]:NEEDS[UniversalStorage2,FeatureScience]:AFTER[KerbalismDefault]
{
	!MODULE[USScienceContainer] {}
	!MODULE[ModuleScienceContainer] {}

	@mass = 0.65
	@cost = 3500

	%MODULE[HardDrive]
	{
		%dataCapacity = #$@KERBALISM_HDD_SIZES/UniversalStorage2/DataStorageWedge/data$
		%sampleCapacity = #$@KERBALISM_HDD_SIZES/UniversalStorage2/DataStorageWedge/samples$
	}
}


// ============================================================================
// Universal Storage 2 - Kerbalism science support
// Covers stock-experiment wedges, new US experiments
// ============================================================================

// ============================================================================
// Tech tree placement (CTT)
// ============================================================================

@part[USGooBayWedge]:NEEDS[UniversalStorage2,CommunityTechTree,!SETI,!RP-0,FeatureScience]:BEFORE[zzzKerbalismDefault]
{
	TechRequired = advConstruction
}
@part[USThermoBaroWedge]:NEEDS[UniversalStorage2,CommunityTechTree,!SETI,!RP-0,FeatureScience]:BEFORE[zzzKerbalismDefault]
{
	TechRequired = miniaturization
}
@part[USMatBayWedge]:NEEDS[UniversalStorage2,CommunityTechTree,!SETI,!RP-0,FeatureScience]:BEFORE[zzzKerbalismDefault]
{
	TechRequired = basicScience
}

// ============================================================================
// Experiment values for US-specific science defs
// ============================================================================

@KERBALISM_EXPERIMENT_VALUES:NEEDS[UniversalStorage2,FeatureScience]
{
	%UniversalStorage2
	{
		// Film camera (limited runs / dual film canisters)
		USmapCam
		{
			ECCost = 0.8
			size = 48
			value = 5
			duration = 180
		}

		// Laser altimeter - low orbit mapping
		USlaserAltimeter
		{
			ECCost = 0.35
			size = 120
			value = 6
			duration = 21600 // 6 hours
		}

		// Simplified microsat sensors (space-only)
		UStemperatureScan
		{
			ECCost = 0.002
			size = 0.35
			value = 2
			duration = 120
		}

		USbarometerScan
		{
			ECCost = 0.03
			size = 1.5
			value = 3
			duration = 300
		}

		// Advanced microsat visual camera
		USCameraPicture
		{
			ECCost = 0.5
			size = 36
			value = 5
			duration = 240
		}

		// Advanced microsat magnetometer (US-specific id, not stock magnetometer)
		USmagnetometer
		{
			ECCost = 0.2
			size = 400
			value = 4
			duration = 151200 // 7 days
		}
	}
}

// ============================================================================
// Hard drive sizes for US2 command / storage parts
// ============================================================================

@KERBALISM_HDD_SIZES:NEEDS[UniversalStorage2,FeatureScience]
{
	%UniversalStorage2
	{
		DataStorageWedge // dedicated data wedge
		{
			data = 600
			samples = 5
		}

		DoubleProbeCore // basicScience, early wedge probe
		{
			data = 8
			samples = 0
		}

		SingleProbeCore // precisionEngineering
		{
			data = 48
			samples = 0
		}

		BasicMicroSat // survivability, light probe + sensors
		{
			data = 12
			samples = 0
		}

		AdvancedMicroSat // survivability, capable probe bus
		{
			data = 64
			samples = 0
		}

		EVAX // EVA extender / mini command
		{
			data = 4
			samples = 1
		}
	}
}

// ============================================================================
// Apply EXPERIMENT_DEFINITION scaling
// ============================================================================

// Localize US2 experiment titles that are hardcoded English in UniversalStorage2/ScienceDefs.cfg
@EXPERIMENT_DEFINITION:HAS[#id[USmapCam]]:NEEDS[UniversalStorage2,FeatureScience]:FOR[zzzKerbalismDefault]
{
	@title = #KERBALISM_US2_Exp_USmapCam
	@baseValue = #$@KERBALISM_EXPERIMENT_VALUES/UniversalStorage2/USmapCam/value$
	@dataScale = #$@KERBALISM_EXPERIMENT_VALUES/UniversalStorage2/USmapCam/size$
	@dataScale /= #$baseValue$
}


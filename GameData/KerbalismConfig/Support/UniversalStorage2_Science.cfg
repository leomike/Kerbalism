// ============================================================================
// Convert US-specific science modules -> Kerbalism Experiment
// ============================================================================

// USMapCamWedge - film camera (USAdvancedScience)
@PART[*]:HAS[@MODULE:HAS[#experimentID[USmapCam]]]:NEEDS[UniversalStorage2,FeatureScience]:FOR[KerbalismDefault]
{
	MODULE
	{
		name = Experiment
		experiment_id = USmapCam
		anim_deploy = #$../MODULE:HAS[#experimentID[USmapCam],~name[Experiment]]/deployAnimationName$
		data_rate = #$@KERBALISM_EXPERIMENT_VALUES/UniversalStorage2/USmapCam/size$
		@data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/UniversalStorage2/USmapCam/duration$
		ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/UniversalStorage2/USmapCam/ECCost$
		sample_amount = 2
		allow_shrouded = False
	}

	!MODULE:HAS[#experimentID[USmapCam],~name[Experiment]] {}
}


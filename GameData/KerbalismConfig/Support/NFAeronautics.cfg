// Reusable nuclear air engines (not disposable stages)
@PART[nfa-atomic-jet-25-1|nfa-atomic-multimode-25-1]:HAS[@MODULE[Reliability]:HAS[#type[ModuleEngines*]]]:NEEDS[NearFutureAeronautics,Kerbalism,FeatureReliability]:FINAL
{
	@MODULE[Reliability]:HAS[#type[ModuleEngines*]]
	{
		@rated_ignitions = 6
	}
}


// ============================================================================
// KerbalismBridge integration: NearFutureAeronautics.cfg
// ============================================================================
// NFA nuclear air engine peak radiation
@PART[nfa-atomic-jet-25-1]:HAS[@MODULE[SystemHeatFissionEngineKerbalismUpdater],!MODULE[Emitter]]:NEEDS[NearFutureAeronautics,Kerbalism,FeatureRadiation]:FOR[zzzzzzz_KerbalismDynamicRadiation]
{
	MODULE
	{
		name = Emitter
		radiation = 0.00083331 // rad/s - open-cycle nuclear airbreather, comparable to SXT nuclear ramjet.
	}
}

@PART[nfa-atomic-multimode-25-1]:HAS[@MODULE[SystemHeatFissionEngineKerbalismUpdater],!MODULE[Emitter]]:NEEDS[NearFutureAeronautics,Kerbalism,FeatureRadiation]:FOR[zzzzzzz_KerbalismDynamicRadiation]
{
	MODULE
	{
		name = Emitter
		radiation = 0.00069444 // rad/s - large multimode nuclear engine.
	}
}

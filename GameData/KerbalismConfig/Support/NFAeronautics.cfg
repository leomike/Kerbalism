// ============================================================================
// KerbalismBridge integration: NearFutureAeronautics.cfg
// ============================================================================
@PART[nfa-atomic-jet-25-1]:NEEDS[SystemHeatFissionEngines]:FOR[Kerbalism]
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = 5
		moduleID = reactor
		iconName = Icon_Nuclear
	}

	@MODULE[ModuleEngines*],*
	{
		@heatProduction = 0
	}

	RESOURCE
	{
		name = EnrichedUranium
		amount = 80
		maxAmount = 80
	}
	RESOURCE
	{
		name = DepletedFuel
		amount = 0
		maxAmount = 80
	}

	// $865 per U
	@cost += 69200
	MODULE
	{
		name = ModuleSystemHeatFissionEngine
		moduleID = engine
		uiGroupDisplayName = #LOC_SystemHeat_ModuleSystemHeatFissionEngine_UIGroup_Title

		allowHibernate = false
		allowManualControl = false

		// -- Heat stuff
		// ModuleSystemHeat instance to link to
		systemHeatModuleID = reactor
		// Heat kW
		HeatGeneration
		{
			key = 0 0
		}
		// Above this temp, risky
		NominalTemperature = 800
		// Above this temp, reactor takes damage
		CriticalTemperature = 1300
		// Amount of damage taken by core when over critical temp
		// %/s/K above CriticalTemperature.
		CoreDamageRate = 0.01

		// -- Reactor throttle stuff
		ThrottleIncreaseRate = 10
		MinimumThrottle = 0
		ThrottleDecreaseRate = 20

		// -- Electrical stuff
		// Power generated
		GeneratesElectricity = false

		// Fuel
		// Base lifetime calculations off this resource
		FuelName = EnrichedUranium

		// -- engine stuff
		ispCurve
		{
			key = 0 0.01
			key = 100 1.0
		}
		engineCoolingScale = 0.9

		INPUT_RESOURCE
		{
			ResourceName = EnrichedUranium
			Ratio = 0.002
			FlowMode = NO_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = DepletedFuel
			Ratio = 0.0020
			DumpExcess = false
			FlowMode = NO_FLOW
		}
	}
	MODULE
	{
		name = ModuleSystemHeatEngine
		// must be unique
		moduleID = engineHeat
		// ModuleSystemHeat to link to
		systemHeatModuleID = reactor
		// Match the NFA engineID; without this SystemHeat cannot bind the heat module.
		engineModuleID = AirBreathing
		// in KW at peak output
		systemPower = 600

		// Nominal system output temperature
		systemOutletTemperature = 1000

		shutdownTemperature = 1400
		// Valid system temperature range
		temperatureCurve
		{
			key = 0 1.0
			key = 1000 1.0
			key = 2000 0.0
		}
	}

	MODULE
	{
		name = ModuleSystemHeatFissionFuelContainer
		EngineerLevelForTransfer = 3
		ResourceNames = EnrichedUranium, DepletedFuel
	}
}


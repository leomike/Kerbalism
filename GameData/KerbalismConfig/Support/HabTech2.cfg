///COLUMBUS LAB LS - supports 2 crew///
@PART[ht2_moduleColumbus]:NEEDS[HabTech2]:AFTER[KerbalismDefault]
{
	@description ^= :^:<color=green>Columbus</color> :
}

@PART[ht2_moduleColumbus]:NEEDS[HabTech2,ProfileDefault]:AFTER[KerbalismDefault]
{
	@tags ^= :$: fuel cell fuelcell water recycler waste processor anthraquinone soe: 

	MODULE
	{
		name = ProcessController
		resource = _MonopropFuelCell
		title = #KERBALISM_MonopropO2FuelCell_title
		capacity = #$/CrewCapacity$
		@capacity *= 5
	    valve_i = 2
		running = false
	}

	MODULE
	{
		name = ProcessController
		resource = _FuelCell
		title = #KERBALISM_FuelCell_title
		capacity = #$/CrewCapacity$
	    valve_i = 1
		running = false
	}

	MODULE
	{
		name = Configure
		configureId = FuelCell
		title = #KERBALISM_FuelCell_title
		slots = 1

		UPGRADES
		{
			UPGRADE
			{
				name__ = Upgrade-Slots
				techRequired__ = advElectrics
				slots = 2
			}
		}

		SETUP
		{
			name = Monoprop Oxygen Fuel Cell
			title = #KERBALISM_MonopropO2FuelCell_title
			desc = #KERBALISM_MonopropO2FuelCell_desc2//Burns <b>MonoPropellant</b> and <b>Oxygen</b> gas, producing <b>Water</b> and <b>Nitrogen</b> gas as by-products.
			tech = survivability
			mass = 0.1
			cost = 1000

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _MonopropFuelCell
			}
		}

		SETUP
		{
			name = Hydrogen Oxygen Fuel Cell
			title = #KERBALISM_H2O2FuelCell_title
			desc = #KERBALISM_H2O2FuelCell_desc//Burns <b>Hydrogen</b> gas and <b>Oxygen</b> gas, producing <b>Water</b> as a by-product.
			tech = advElectrics
			mass = 0.05
			cost = 2500
			valve_i = 1

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _FuelCell
			}
		}
	}

	MODULE:NEEDS[FeatureReliability]
	{
		name = Reliability
		type = ProcessController
		title = #KERBALISM_FuelCell_title
		redundancy = Power Generation
		repair = Engineer
		mtbf = 72576000
		extra_cost = 0.1
		extra_mass = 0.05
	}

	-MODULE[ProcessController]:HAS[#resource[?Scrubber]] { }
	-MODULE[ProcessController]:HAS[#resource[?PressureControl]] { }

	-MODULE[ProcessController]:HAS[#resource[?WaterRecycler]] { }
	MODULE
	{
		name = ProcessController
		resource = _WaterRecycler
		title = #KERBALISM_WaterRecycler_title
		capacity = #$/CrewCapacity$
		running = false
	}

	-MODULE[ProcessController]:HAS[#resource[?WasteProcessor]] { }
	MODULE
	{
		name = ProcessController
		resource = _WasteProcessor
		title = #KERBALISM_WasteProcessor_title
		capacity = #$/CrewCapacity$
		running = false
	}

	MODULE
	{
		name = ProcessController
		resource = _Anthraquinone
		title = #KERBALISM_Process_AnthraquinoneProcess
		capacity = #$/CrewCapacity$
		running = false
	}

	MODULE
	{
		name = ProcessController
		resource = _SOE
		title = #KERBALISM_Process_SolidOxideElectrolysis
		capacity = #$/CrewCapacity$
		running = false
	}

	MODULE
	{
		name = Configure
		configureId = HabitatRecyclers
		title = #KERBALISM_Configure_HabitatRecyclers_title
		slots = 1

		UPGRADES
		{
			UPGRADE
			{
				name__ = Upgrade-Slots
				techRequired__ = recycling
				slots = 2
			}
			UPGRADE
			{
				name__ = Upgrade-Slots_advScienceTech
				techRequired__ = advScienceTech
				slots = 3
			}
		}

		SETUP
		{
			name = Water Recycler
			title = #KERBALISM_WaterRecycler_title
			desc = #KERBALISM_WaterRecycler_desc//Filter impurities out of <b>WasteWater</b>.
			tech = recycling
			mass = 0.05
			cost = 500


			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _WaterRecycler
			}

			RESOURCE
			{
				name = WasteWater
				amount = 0
				maxAmount = #$/CrewCapacity$
				@maxAmount *= 5
			}
		}

		SETUP
		{
			name = Waste Processor
			title = #KERBALISM_WasteProcessor_title
			desc = #KERBALISM_WasteProcessor_desc//Extract <b>Ammonia</b> out of decomposing organic <b>Waste</b>.
			tech = shortTermHabitation
			mass = 0.05
			cost = 500

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _WasteProcessor
			}

			RESOURCE
			{
				name = Waste
				amount = 0
				maxAmount = #$/CrewCapacity$
				@maxAmount *= 5
			}
		}

		SETUP
		{
			name = Anthraquinone Process
			title = #KERBALISM_Process_AnthraquinoneProcess
			desc = #KERBALISM_AnthraquinoneProcess_desc//Synthesize <b>Oxidizer</b> using a redox of <b>Oxygen</b> and <b>Hydrogen</b>.
			tech = advScienceTech
			mass = 0.1
			cost = 3500

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _Anthraquinone
			}
		}

		SETUP
		{
			name = Solid Oxide Electrolysis
			title = #KERBALISM_Process_SolidOxideElectrolysis
			desc = #KERBALISM_SolidOxideElectrolysis_desc//Transform <b>CarbonDioxide</b> into <b>Oxygen</b> and <b>Shielding</b>.
			tech = experimentalScience
			mass = 0.15
			cost = 4500

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _SOE
			}
		}
	}
	
	// MODULE:NEEDS[FeatureReliability]
	// {
		// name = Reliability
		// type = ProcessController
		// title = Habitat recyclers
		// repair = Engineer
		// mtbf = 72576000
		// extra_cost = 0.1
		// extra_mass = 0.1
	// }
}


///KIBO LOGISTICS LS///
@PART[ht2_moduleJEMlogistics]:NEEDS[HabTech2,!B9PartSwitch,CommunityResourcePack,ProfileDefault]:AFTER[zzzKerbalismDefault]
{
	@tags ^= :$: container food water waste sewage:
	%ContainerVolume = 2000

	MODULE
	{
		name = Configure
		configureId = SupplyContainer
		title = #KERBALISM_Configure_SupplyContainer_title
		slots = 1
		symmetric = true

		SETUP
		{
			name = Supplies	//	Ratio of Food and Water amounts are the same as a Kerbals intake
			title = #KERBALISM_Setup_Supplies_title
			desc = #KERBALISM_SupplyContainer_desc//Store a balanced supply of <b>Food</b> and <b>Water</b>.

			RESOURCE
			{
				name = Food
				amount = 0.7221584
				maxAmount = 0.7221584
				@amount *= #$/ContainerVolume$
				@maxAmount *= #$/ContainerVolume$
			}

			RESOURCE
			{
				name = Water
				amount = 0.2778416
				maxAmount = 0.2778416
				@amount *= #$/ContainerVolume$
				@maxAmount *= #$/ContainerVolume$
			}
		}

		SETUP
		{
			name = Food
			title = #KERBALISM_Setup_Food_title

			RESOURCE
			{
				name = Food
				amount = 1
				maxAmount = 1
				@amount *= #$/ContainerVolume$
				@maxAmount *= #$/ContainerVolume$
			}
		}

		SETUP
		{
			name = Water
			title = #KERBALISM_Setup_Water_title

			RESOURCE
			{
				name = Water
				amount = 1
				maxAmount = 1
				@amount *= #$/ContainerVolume$
				@maxAmount *= #$/ContainerVolume$
			}
		}

		SETUP
		{
			name = Sewage	//	Ratio of Waste and WasteWater amounts are the same as a Kerbals output
			title = #KERBALISM_Setup_Sewage_title
			desc = #KERBALISM_SupplyContainer_desc2//Store solid and liquid organic <b>Waste</b>.

			RESOURCE
			{
				name = Waste
				amount = 0
				maxAmount = 0.4946378
				@amount *= #$/ContainerVolume$
				@maxAmount *= #$/ContainerVolume$
			}

			RESOURCE
			{
				name = WasteWater
				amount = 0
				maxAmount = 0.5053622
				@amount *= #$/ContainerVolume$
				@maxAmount *= #$/ContainerVolume$
			}
		}

		SETUP
		{
			name = Waste
			title = #KERBALISM_Setup_Waste_title

			RESOURCE
			{
				name = Waste
				amount = 0
				maxAmount = 1
				@amount *= #$/ContainerVolume$
				@maxAmount *= #$/ContainerVolume$
			}
		}

		SETUP
		{
			name = WasteWater
			title = #KERBALISM_Setup_WasteWater_title

			RESOURCE
			{
				name = WasteWater
				amount = 0
				maxAmount = 1
				@amount *= #$/ContainerVolume$
				@maxAmount *= #$/ContainerVolume$
			}
		}
	}
}


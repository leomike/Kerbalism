// ============================================================================
// KerbalismProcessPlannerCleanup.cfg
// Remove leftover planner UI and reliability modules after stock modules are replaced.
// ============================================================================

@PART[FuelCell|FuelCellArray]:HAS[@MODULE[ProcessController],!MODULE[ModuleResourceConverter]]:NEEDS[Kerbalism,ProfileDefault]:AFTER[KerbalismDefault]
{
	!MODULE[PlannerController],* {}
	!MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}
}

@PART[strl-worldpower-sth*]:HAS[!MODULE[ModuleResourceConverter]]:NEEDS[Kerbalism,SterlingSystems]:AFTER[Kerbalism]
{
	!MODULE[PlannerController]:HAS[#plannerId[converter]],* {}
	!MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}
}

@PART[*]:HAS[@MODULE[ProcessController]|@MODULE[ProcessControllerSystemHeat],!MODULE[ModuleResourceConverter]]:NEEDS[Kerbalism]:FINAL
{
	!MODULE[PlannerController]:HAS[#plannerId[converter]],* {}
	!MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}
}

@PART[*]:HAS[@MODULE[ProcessController]|@MODULE[ProcessControllerSystemHeat],!MODULE[ModuleGenerator]]:NEEDS[Kerbalism]:FINAL
{
	!MODULE[PlannerController]:HAS[#plannerId[generator]],* {}
	!MODULE[Reliability]:HAS[#type[ModuleGenerator]],* {}
}
